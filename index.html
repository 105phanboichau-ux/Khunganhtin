        function parseConfigText(text) {
            var lines = text.split('\n'); var section = "";
            var tempB = [], tempA = [], tempF = [], tempS = [], tempQ = [];
            for (var i = 0; i < lines.length; i++) {
                var line = lines[i].replace('\r', '').trim();
                if (!line || line.indexOf('#') === 0) continue;
                if (line.indexOf('[') === 0) { section = line.toUpperCase(); continue; }
                if (section === "[THONG TIN QUAN TRONG]") {
                    var parts = line.split('=');
                    if(parts.length === 2) {
                        var k = parts[0].trim().toUpperCase(); var v = parts[1].trim();
                        if(k === "VI_DO") defaultLatitude = parseFloat(v);
                        if(k === "KINH_DO") defaultLongitude = parseFloat(v);
                        if(k === "TEN_DIA_PHUONG") defaultLocalName = v;
                    }
                }
                else if (section === "[DANH SACH SINH NHAT]") {
                    var mB = line.match(/^(\d{1,2})\s*[\/]\s*(\d{1,2})\s+(.+)$/);
                    if (mB) tempB.push({d: parseInt(mB[1],10), m: parseInt(mB[2],10), name: mB[3].trim()});
                }
                else if (section === "[DANH SACH NGAY GIO]") {
                    var mA = line.match(/^(\d{1,2})\s*[\/]\s*(\d{1,2})\s+(.+)$/);
                    if (mA) tempA.push({d: parseInt(mA[1],10), m: parseInt(mA[2],10), name: mA[3].trim()});
                }
                else if (section === "[LE HOI VIET NAM]" || section === "[NGAY LE TON GIAO]" || section === "[LE HOI VA NGAY LE TON GIAO]") {
                    var mF = line.match(/^(s|l)\s*[\/]\s*(\d{1,2})\s*[\/]\s*(\d{1,2})\s+(.+)$/i);
                    if (mF) tempF.push({type: mF[1].toLowerCase(), m: parseInt(mF[2],10), d: parseInt(mF[3],10), text: mF[4].trim()});
                }
                else if (section === "[DAC SAN THEO MUA]") {
                    var mS = line.match(/^(\d{1,2})\s+(.+)$/);
                    if (mS) tempS.push({m: parseInt(mS[1],10), text: mS[2].trim()});
                }
                else if (section === "[KHO DANH NGON CUOC LIFE]" || section === "[KHO DANH NGON CUOC SONG]") {
                    tempQ.push(line);
                }
            }
            if(tempB.length>0) birthdays = tempB; if(tempA.length>0) anniversaries = tempA;

            if (dice < 0.5 && activeSpecialties.length > 0) { finalQuote = "Mùa này " + activeSpecialties[Math.floor(Math.random() * activeSpecialties.length)]; } 
            else if (quotePool.length > 0) { finalQuote = quotePool[Math.floor(Math.random() * quotePool.length)]; }
            else { finalQuote = "Nhà là nơi bão dừng sau cánh cửa, nơi bình yên ấm áp nhất để trở về."; }

            var nextActiveFestivalText = "";
            var minDiff = 365;
            for(var f=0; f<festivalsData.length; f++) {
                var fest = festivalsData[f];
                if(fest.type === 's' && fest.m === currentSolarMonth && fest.d >= sDay) {
                    var diff = fest.d - sDay;
                    if(diff < minDiff) { minDiff = diff; nextActiveFestivalText = (diff === 0 ? "Hôm nay: " : "Còn " + diff + " ngày đến ") + fest.text + " (" + fest.d + "/" + fest.m + ")"; }
                }
                if(fest.type === 'l' && fest.m === currentLunarMonth && fest.d >= lDay) {
                    var diffL = fest.d - lDay;
                    if(diffL < minDiff) { minDiff = diffL; nextActiveFestivalText = (diffL === 0 ? "Hôm nay: " : "Còn " + diffL + " ngày đến ") + fest.text + " (" + fest.d + "/" + fest.m + " ÂL)"; }
                }
            }

            var fullText = finalQuote;
            if(nextActiveFestivalText !== "") { fullText += ' <span class="countdown-highlight">&nbsp; | &nbsp;' + nextActiveFestivalText + '</span>'; }
            
            document.getElementById('quote-row').innerHTML = fullText;
            syncTempSize();
        }

        // 🌟 BẢO VỆ MÃ LỆNH KHI GOOGLE DRIVE LỖI HOẶC QUÁ TẢI (MÀN HÌNH KHÔNG BAO GIỜ BỊ ĐEN)
        function syncDriveData() {
            var query = encodeURIComponent("'" + FOLDER_ID + "' in parents and name = 'cauhinh.txt' and trashed = false");
            var url = 'https://www.googleapis.com/drive/v3/files?q=' + query + '&key=' + API_KEY + '&fields=files(id)';
            var xhr = new XMLHttpRequest(); xhr.open('GET', url, true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    var data = JSON.parse(xhr.responseText);
                    if (data.files && data.files.length > 0) { downloadConfigFile(data.files[0].id); }
                }
            };
            xhr.send();

            var imgQuery = encodeURIComponent("'" + FOLDER_ID + "' in parents and mimeType contains 'image/'");
            var imgUrl = 'https://www.googleapis.com/drive/v3/files?q=' + imgQuery + '&key=' + API_KEY + '&fields=files(id)';
            var xhrDrive = new XMLHttpRequest(); xhrDrive.open('GET', imgUrl, true);
            xhrDrive.onreadystatechange = function() {
                if (xhrDrive.readyState === 4) {
                    if (xhrDrive.status === 200) {
                        var data = JSON.parse(xhrDrive.responseText);
                        if (data.files && data.files.length > 0) {
                            images = [];
                            for (var i = 0; i < data.files.length; i++) { images.push('https://drive.google.com/thumbnail?id=' + data.files[i].id + '&sz=w2048'); }
                            for (var k = images.length - 1; k > 0; k--) { var j = Math.floor(Math.random() * (k + 1)); var temp = images[k]; images[k] = images[j]; images[j] = temp; }
                            initSlideshow();
                        } else { fallbackInit("Thư mục rỗng! Vui lòng tải ảnh lên Drive."); }
                    } else {
                        fallbackInit("Lỗi API/Mạng! Đang dùng ảnh dự phòng...");
                    }
                }
            }; xhrDrive.send();
        }

        function fallbackInit(msg) {
            document.getElementById('quote-row').innerText = msg;
            images = ['https://images.unsplash.com/photo-1506744626753-14002fa88301?q=80&w=2048&auto=format&fit=crop'];
            initSlideshow();
            syncTempSize();
        }

        function updateImageDisplayMechanism(imgElement, groupElement) {
            var isScreenLandscape = (window.innerWidth > window.innerHeight);
            var isImageLandscape = (imgElement.naturalWidth > imgElement.naturalHeight);
            imgElement.classList.remove('fit-cover', 'fit-contain'); groupElement.classList.add('show-blur');
            if (isScreenLandscape) { if (isImageLandscape) { imgElement.classList.add('fit-cover'); } else { imgElement.classList.add('fit-contain'); } } 
            else { if (!isImageLandscape) { imgElement.classList.add('fit-cover'); } else { imgElement.classList.add('fit-contain'); } }
            var nHrNode = document.getElementById('night-hr-node');
            var hrStr = document.getElementById('hr-node').innerText;
            if (isScreenLandscape) { nHrNode.innerText = hrStr + ":"; } else { nHrNode.innerText = hrStr; }
        }

        window.addEventListener('resize', function() {
            var activeFg = document.getElementById(isGroup1Active ? 'fg1' : 'fg2');
            var activeGroup = document.getElementById(isGroup1Active ? 'group1' : 'group2');
            if (activeFg && activeFg.naturalWidth) updateImageDisplayMechanism(activeFg, activeGroup);
            syncTempSize();
        });

        function loadAndDisplayImage(imgUrl, groupID, bgID, fgID) {
            var currentGroup = document.getElementById(isGroup1Active ? 'group1' : 'group2'); var nextGroup = document.getElementById(groupID);
            var nextBg = document.getElementById(bgID); var nextFg = document.getElementById(fgID);
            nextFg.onload = function() { updateImageDisplayMechanism(nextFg, nextGroup); currentGroup.classList.remove('active'); nextGroup.classList.add('active'); isGroup1Active = !isGroup1Active; currentIndex = (currentIndex + 1) % images.length; updateDynamicContentBySlide(); };
            nextBg.src = imgUrl; nextFg.src = imgUrl;
        }

        function initSlideshow() { applyClockStyle(); updateClock(); loadAndDisplayImage(images[0], isGroup1Active ? 'group1' : 'group2', isGroup1Active ? 'bg1' : 'bg2', isGroup1Active ? 'fg1' : 'fg2'); changeIntervalMode(currentIntervalIdx + 1); }
        function goToNextSlide() { if(images.length <= 1) return; var nextIndex = (currentIndex + 1) % images.length; loadAndDisplayImage(images[nextIndex], isGroup1Active ? 'group2' : 'group1', isGroup1Active ? 'bg2' : 'bg1', isGroup1Active ? 'fg2' : 'fg1'); }

        function changeIntervalMode(modeVal) {
            currentIntervalIdx = modeVal - 1; var seconds = stepSeconds[currentIntervalIdx];
            if (slideInterval) clearInterval(slideInterval); slideInterval = setInterval(goToNextSlide, seconds * 1000);
        }

        syncDriveData();
    </script>
</body>
</html>
