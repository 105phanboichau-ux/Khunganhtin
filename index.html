<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="referrer" content="no-referrer">
    
    <title>Khung Ảnh Số Nghệ Thuật</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Tourney:wght@600&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            width: 100%; height: 100%; overflow: hidden;
            background-color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            cursor: pointer; transition: background-color 1s ease;
        }
        
        #frame-wrapper {
            position: absolute; top: 60px; left: 60px; right: 60px; bottom: 60px; 
            background-color: #000; overflow: hidden;
            box-shadow: 0px 15px 45px rgba(0, 0, 0, 0.15), inset 0px 0px 30px rgba(0,0,0,0.85);
            border: 1px solid #eaeaea; transition: all 0.5s ease;
        }

        #photo-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* HIỆU ỨNG TIKTOK BLUR: Tạo 2 nhóm chứa ảnh nền và ảnh thực */
        .slide-group {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; transition: opacity 3s ease-in-out;
        }
        .slide-group.active { opacity: 1; z-index: 2; }
        
        /* Ảnh nền: Phóng to, làm mờ 35px, giảm sáng tạo chiều sâu */
        .bg-img {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover !important; 
            -webkit-filter: blur(35px) brightness(0.4);
            filter: blur(35px) brightness(0.4);
            transform: scale(1.15); /* Phóng to nhẹ để không bị lộ viền trắng do blur */
        }
        /* Ảnh thực: Nguyên bản, đổ bóng nổi 3D lơ lửng */
        .fg-img {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: contain !important; 
            -webkit-filter: drop-shadow(0px 15px 45px rgba(0,0,0,0.7));
            filter: drop-shadow(0px 15px 45px rgba(0,0,0,0.7));
        }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.15); z-index: 3; pointer-events: none; }

        /* ĐỒNG HỒ KHỔNG LỒ */
        #info-container {
            position: absolute; top: 40px; left: 40px; z-index: 4; color: #ffffff;
            text-shadow: 0px 4px 15px rgba(0, 0, 0, 0.8);
            display: flex; flex-direction: column; align-items: center; text-align: center;
            transition: transform 0.5s ease-out, top 0.8s ease-in-out, left 0.8s ease-in-out; 
        }
        #time { font-size: 8.5rem; line-height: 0.9; display: flex; align-items: center; justify-content: center; gap: 15px; }
        .hours-style { font-family: 'Montserrat', sans-serif; font-weight: 700; color: #F4B41A; letter-spacing: -2px; }
        .minutes-style { font-family: 'Tourney', sans-serif; font-weight: 600; color: #ffffff; letter-spacing: -1px; }

        /* BỐ CỤC ĐÁY 1x2 MỞ RỘNG KHOẢNG CÁCH */
        #bottom-container {
            position: absolute; bottom: 30px; left: 40px; right: 40px; z-index: 4;
            display: flex; flex-direction: row; align-items: center; justify-content: flex-start; 
            gap: 35px; /* ĐÃ TĂNG KHOẢNG CÁCH GẤP ĐÔI TẠO ĐỘ THOÁNG */
            text-shadow: 0px 3px 12px rgba(0, 0, 0, 0.95); transition: all 0.5s ease; 
        }
        
        /* 1. Nhiệt độ siêu to, xóa chữ C */
        #weather-temp { font-size: 6.5rem; font-weight: 700; color: #ffffff; line-height: 0.9; letter-spacing: -3px; }

        /* 2. Khối chữ thông tin - Thêm hiệu ứng Fade mờ dần khi đổi ảnh */
        #text-fade-zone {
            display: flex; flex-direction: column; justify-content: center; gap: 12px; 
            max-width: calc(100% - 160px); text-align: left; 
            opacity: 1; transition: opacity 1.5s ease-in-out;
        }
        #text-fade-zone.hidden { opacity: 0; } /* Class dùng để chớp tắt chữ */

        /* DÒNG TRÊN: Tăng kích thước, ghép dương lịch, âm lịch và thông số động */
        #status-row { 
            display: flex; flex-direction: row; flex-wrap: wrap; align-items: center; gap: 10px; 
            font-size: 1.6rem; color: #ffffff; font-weight: 500; 
        }
        .highlight-yellow { color: #F4B41A; font-weight: 700; }
        .bar-separator { opacity: 0.4; font-weight: 300; padding: 0 4px; }

        /* DÒNG DƯỚI: Danh ngôn */
        #quote-row { 
            font-size: 1.45rem; font-weight: 300; font-style: italic; color: #f5f5f7; 
            white-space: normal !important; word-wrap: break-word; line-height: 1.4;
        }

        /* ĐIỀU KHIỂN */
        #control-panel {
            position: absolute; top: 20px; right: 20px; z-index: 10;
            background: rgba(0, 0, 0, 0.65); padding: 10px 14px; border-radius: 8px;
            color: #fff; font-size: 0.85rem; backdrop-filter: blur(5px);
            opacity: 0.2; transition: opacity 0.3s ease; display: flex; flex-direction: column; gap: 6px;
        }
        #control-panel.active-panel, #control-panel:hover { opacity: 1 !important; }
        .speed-btn-group { display: flex; gap: 6px; }
        .speed-btn { background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.3); color: #fff; padding: 4px 8px; font-size: 0.8rem; border-radius: 4px; cursor: pointer; font-weight: 500; transition: all 0.2s ease; }
        .speed-btn.active { background: #F4B41A !important; border-color: #F4B41A !important; color: #000 !important; font-weight: bold; }

        /* BAN ĐÊM (21:00 - 05:00) */
        .night-active { background-color: #000000 !important; } 
        .night-active #photo-container, .night-active #bottom-container { display: none !important; }
        .night-active #frame-wrapper { background-color: #000000 !important; box-shadow: none !important; border-color: transparent !important; }
        .night-active .hours-style { color: #ffffff !important; } 
        .night-active #info-container { text-shadow: none !important; }

        /* RESPONSIVE */
        @media (max-width: 900px) {
            html { font-size: 13px; } 
            #frame-wrapper { top: 35px; left: 30px; right: 30px; bottom: 35px; } 
            #weather-temp { font-size: 5.5rem; }
        }
        @media (max-width: 480px) {
            html { font-size: 9.5px; } 
            #frame-wrapper { top: 15px; left: 15px; right: 15px; bottom: 15px; } 
            #info-container { top: 20px; left: 20px; } 
            #bottom-container { flex-direction: column; align-items: flex-start; bottom: 15px; left: 20px; right: 20px; gap: 10px; }
            #text-fade-zone { max-width: 100%; }
        }
    </style>
</head>

                <img id="fg2" class="fg-img" alt="" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" referrerpolicy="no-referrer">

    <script>
        var SECRET_ENCODED = 'QUl6YVN5REwyRm1VQzkxMUtBTnFwN3VPbnZKcU5xVHltb1R2SkxF';
        var API_KEY = atob(SECRET_ENCODED);
        var FOLDER_ID = '1r1WUIKwAPAnsyIh-Zot7AevEW0uEZ-Hl'; 

        var images = [];
        var currentIndex = 0;
        var slideInterval;
        var hideTimeout;
        var lastChimeHour = -1;
        var audioCtx = null; 
        var isGroup1Active = true; 
        var audioUnlocked = false;

        // Biến lưu trữ dữ liệu môi trường toàn cục
        var globalAQI = "--", globalHum = "--", globalRain = "--", globalSunrise = "--", globalSunset = "--";

        var burnInX1 = 0, burnInY1 = 0, burnInX2 = 0, burnInY2 = 0;
        var stepSeconds = { 1: 60, 2: 180, 3: 300, 4: 600 };
        var currentActiveMode = 2; 

        function activateControls() {
            // MẸO BẺ KHÓA ÂM THANH TRÊN IOS 10 BẰNG CÁCH TẠO 1 SÓNG ÂM ẢO 1 MILI GIÂY
            if (!audioUnlocked) {
                try { 
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)(); 
                    var osc = audioCtx.createOscillator();
                    osc.connect(audioCtx.destination);
                    osc.start(0); osc.stop(0.001);
                    audioUnlocked = true;
                } catch (e) {}
            }
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();

            var panel = document.getElementById('control-panel');
            panel.classList.add('active-panel');
            if (hideTimeout) clearTimeout(hideTimeout);
            hideTimeout = setTimeout(function() { panel.classList.remove('active-panel'); }, 3000);
        }

        function runAntiBurnIn() {
            burnInX1 = Math.floor(Math.random() * 24) - 12; burnInY1 = Math.floor(Math.random() * 24) - 12;
            burnInX2 = Math.floor(Math.random() * 24) - 12;
            applyDynamicPositions();
        }
        setInterval(runAntiBurnIn, 60000); 

        function applyDynamicPositions() {
            var now = new Date(); var isNightMode = (now.getHours() >= 21 || now.getHours() < 5); 
            var infoNode = document.getElementById('info-container');
            var bottomNode = document.getElementById('bottom-container');

            if (isNightMode) {
                infoNode.style.top = "50%"; infoNode.style.left = "50%";
                infoNode.style.transform = "translate(-50%, -50%) translate(" + burnInX1 + "px, " + burnInY1 + "px)";
            } else {
                infoNode.style.top = "40px"; infoNode.style.left = "40px";
                infoNode.style.transform = "translate(" + burnInX1 + "px, " + burnInY1 + "px)";
            }
            if (bottomNode) bottomNode.style.transform = "translate(" + burnInX2 + "px, 0px)";
        }

        function playHourlyChime(currentHour) {
            if (currentHour < 6 || currentHour >= 21 || !audioCtx) return;
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                var osc1 = audioCtx.createOscillator(); var gain1 = audioCtx.createGain();
                osc1.type = 'sine'; osc1.frequency.setValueAtTime(880, audioCtx.currentTime); 
                gain1.gain.setValueAtTime(0.18, audioCtx.currentTime); gain1.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);
                osc1.connect(gain1); gain1.connect(audioCtx.destination);
                osc1.start(); osc1.stop(audioCtx.currentTime + 0.8);
                
                setTimeout(function() {
                    if (audioCtx.state === 'suspended') audioCtx.resume();
                    var osc2 = audioCtx.createOscillator(); var gain2 = audioCtx.createGain();
                    osc2.type = 'sine'; osc2.frequency.setValueAtTime(659.25, audioCtx.currentTime); 
                    gain2.gain.setValueAtTime(0.18, audioCtx.currentTime); gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.2);
                    osc2.connect(gain2); gain2.connect(audioCtx.destination);
                    osc2.start(); osc2.stop(audioCtx.currentTime + 1.2);
                }, 350);
            } catch(e) {}
        }

        function getLunarFormat(now) {
            var phases = [
                [2025, 11, 20, 11, "Ất Tỵ"], [2026, 0, 19, 12, "Ất Tỵ"],
                [2026, 1, 17, 1, "Bính Ngọ"], [2026, 2, 19, 2, "Bính Ngọ"],
                [2026, 3, 17, 3, "Bính Ngọ"], [2026, 4, 17, 4, "Bính Ngọ"],
                [2026, 5, 15, 5, "Bính Ngọ"], [2026, 6, 14, 6, "Bính Ngọ"],
                [2026, 7, 12, 7, "Bính Ngọ"], [2026, 8, 11, 8, "Bính Ngọ"],
                [2026, 9, 11, 9, "Bính Ngọ"], [2026, 10, 9, 10, "Bính Ngọ"],
                [2026, 11, 9, 11, "Bính Ngọ"], [2027, 0, 8, 12, "Bính Ngọ"],
                [2027, 1, 6, 1, "Đinh Mùi"]
            ];
            var activePhase = phases[0];
            var checkTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0);
            for (var i = 0; i < phases.length; i++) {
                var d = new Date(phases[i][0], phases[i][1], phases[i][2], 0, 0, 0);
                if (checkTime >= d) activePhase = phases[i]; else break;
            }
            var startDate = new Date(activePhase[0], activePhase[1], activePhase[2], 0, 0, 0);
            var diffDays = Math.floor((checkTime - startDate) / (1000 * 60 * 60 * 24)) + 1;
            return diffDays + '/' + activePhase[3] + '/' + activePhase[4];
        }

        // TÍNH NĂNG MỚI: Đồng bộ đổi chữ Danh ngôn và Thông số Thời tiết chớp tắt theo ảnh
        function updateDynamicContentBySlide(indexSeed) {
            var now = new Date();
            var targetTetAm = new Date(2027, 1, 6); var targetTetDuong = new Date(2027, 0, 1);
            var targetNoel = new Date(2026, 11, 25); var targetTrungThu = new Date(2026, 8, 25);
            var targetPhatDan = new Date(2026, 4, 31); var targetQuocKhanh = new Date(2026, 8, 2);

            var daysToTetAm = Math.ceil((targetTetAm - now) / (86400000));
            var daysToTetDuong = Math.ceil((targetTetDuong - now) / (86400000));
            var daysToNoel = Math.ceil((targetNoel - now) / (86400000));
            var daysToTrungThu = Math.ceil((targetTrungThu - now) / (86400000));
            var daysToPhatDan = Math.ceil((targetPhatDan - now) / (86400000));
            var daysToQuocKhanh = Math.ceil((targetQuocKhanh - now) / (86400000));

            var eventPool = [];
            if (daysToTetAm > 0) eventPool.push('Còn ' + daysToTetAm + ' ngày đến Tết Nguyên Đán 2027');
            if (daysToTetDuong > 0) eventPool.push('Còn ' + daysToTetDuong + ' ngày đến Tết Dương Lịch 2027');
            if (daysToNoel > 0) eventPool.push('Còn ' + daysToNoel + ' ngày đến Giáng Sinh');
            if (daysToTrungThu > 0) eventPool.push('Còn ' + daysToTrungThu + ' ngày đến Tết Trung Thu');
            if (daysToPhatDan > 0) eventPool.push('Còn ' + daysToPhatDan + ' ngày đến Lễ Phật Đản');
            if (daysToQuocKhanh > 0) eventPool.push('Còn ' + daysToQuocKhanh + ' ngày đến Quốc Khánh 2/9');
            eventPool.push("Sắp đến Rằm Âm Lịch hằng tháng - Hướng về tổ tiên");
            eventPool.push("Sắp đến Mùng 1 Âm Lịch - Khởi đầu tháng mới bình an");

            var quotePool = [
                "Mùa bơ sáp Đắk Lắk chín quả vàng, ruột dẻo thơm béo ngậy đặc sản đất đỏ Tây Nguyên.",
                "Thưởng thức ly cà phê Buôn Ma Thuột đậm đặc đắng nồng giữa đại ngàn lộng gió.",
                "Mùa sầu riêng Dona Đắk Lắk thơm nức mũi, cơm dày hạt lép ngọt ngào say đắm.",
                "Mùa thu Hà Nội nồng nàn hương cốm Vòng mộc mạc xanh non gói trong lá sen.",
                "Ghé thăm Sa Pa mùa lúa chín vàng óng ả đổ tràn trên những ruộng bậc thang kì vĩ.",
                "Thưởng thức gỏi lá Kon Tum - Hội tụ tinh hoa ẩm thực của hơn 40 loại lá rừng núi.",
                "Mùa hoa dã quỳ nở rực rỡ nhuộm vàng rực khắp các cung đường đất đỏ bazan Tây Nguyên.",
                "Thưởng thức cá bống thác kho tộ đậm đà cay nồng ăn cùng cơm lam Bản Đôn dẻo thơm.",
                "Gia đình là nơi cuộc sống bắt đầu và tình yêu không bao giờ kết thúc.",
                "Nhà là nơi bão dừng sau cánh cửa, nơi bình yên ấm áp nhất để trở về."
            ];

            // Tự động xoay tua các thông số môi trường tuyệt đỉnh
            var envPool = [
                'AQI <span class="highlight-yellow">' + globalAQI + '</span>',
                'Độ ẩm <span class="highlight-yellow">' + globalHum + '</span>',
                'Có mưa <span class="highlight-yellow">' + globalRain + '</span>',
                'Bình minh <span class="highlight-yellow">' + globalSunrise + '</span>',
                'Hoàng hôn <span class="highlight-yellow">' + globalSunset + '</span>',
                'Độ cao <span class="highlight-yellow">536m</span>'
            ];

            document.getElementById('countdown-text').innerHTML = eventPool[indexSeed % eventPool.length];
            document.getElementById('quote-text').innerText = '"' + quotePool[indexSeed % quotePool.length] + '"';
            document.getElementById('dynamic-env').innerHTML = envPool[indexSeed % envPool.length];
        }

        function updateClock() {
            var now = new Date(); var hours = now.getHours(); var minutes = now.getMinutes();
            
            var hrStr = hours < 10 ? '0' + hours : hours; var minStr = minutes < 10 ? '0' + minutes : minutes;
            document.getElementById('time').innerHTML = '<span class="hours-style">' + hrStr + '</span><span class="minutes-style">' + minStr + '</span>';

            // Ghép Dương Lịch và Âm Lịch chuẩn fomat Tô vàng
            var days = ['Chủ Nhật', 'Thứ 2', 'Thứ 3', 'Thứ 4', 'Thứ 5', 'Thứ 6', 'Thứ 7'];
            var solarStr = '<span class="highlight-yellow">' + days[now.getDay()] + '</span> Ngày ' + now.getDate() + '/' + (now.getMonth() + 1) + '/' + now.getFullYear();
            var lunarStr = getLunarFormat(now);
            
            document.getElementById('date-lunar-combo').innerHTML = solarStr + ' <span class="bar-separator">|</span> ' + lunarStr;

            if (hours >= 21 || hours < 5) document.body.classList.add('night-active');
            else document.body.classList.remove('night-active');
            applyDynamicPositions();

            if (minutes === 0 && hours !== lastChimeHour) { playHourlyChime(hours); lastChimeHour = hours; }
        }
        setInterval(updateClock, 1000);
        updateClock();

        function updateWeatherAndAQI() {
            var lat = 12.6667; var lon = 108.0500;
            
            // Gọi tổng hợp Nhiệt độ, Độ ẩm, Khả năng mưa, Bình minh, Hoàng hôn
            var xhrWeather = new XMLHttpRequest();
            xhrWeather.open('GET', 'https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lon + '&current=temperature_2m,relative_humidity_2m,precipitation_probability&daily=sunrise,sunset&timezone=Asia%2FHo_Chi_Minh', true);
            xhrWeather.onreadystatechange = function() {
                if (xhrWeather.readyState === 4 && xhrWeather.status === 200) {
                    var data = JSON.parse(xhrWeather.responseText);
                    document.getElementById('weather-temp').innerText = Math.round(data.current.temperature_2m) + '°';
                    
                    globalHum = data.current.relative_humidity_2m + '%';
                    globalRain = data.current.precipitation_probability + '%';
                    
                    // Xử lý cắt chuỗi giờ bình minh/hoàng hôn (Ví dụ: "2026-06-12T05:30" -> "05:30")
                    if(data.daily && data.daily.sunrise && data.daily.sunrise[0]) {
                        globalSunrise = data.daily.sunrise[0].substring(11, 16);
                        globalSunset = data.daily.sunset[0].substring(11, 16);
                    }
                }
            };
            xhrWeather.send();

            var xhrAQI = new XMLHttpRequest();
            xhrAQI.open('GET', 'https://air-quality-api.open-meteo.com/v1/air-quality?latitude=' + lat + '&longitude=' + lon + '&current=us_aqi', true);
            xhrAQI.onreadystatechange = function() {
                if (xhrAQI.readyState === 4 && xhrAQI.status === 200) {
                    var data = JSON.parse(xhrAQI.responseText);
                    globalAQI = data.current.us_aqi; 
                }
            };
            xhrAQI.send();
        }
        updateWeatherAndAQI();
        setInterval(updateWeatherAndAQI, 600000);

        function fetchImagesFromDrive() {
            var query = encodeURIComponent("'" + FOLDER_ID + "' in parents and mimeType contains 'image/'");
            var url = 'https://www.googleapis.com/drive/v3/files?q=' + query + '&key=' + API_KEY + '&fields=files(id)';
            
            var xhrDrive = new XMLHttpRequest();
            xhrDrive.open('GET', url, true);
            xhrDrive.onreadystatechange = function() {
                if (xhrDrive.readyState === 4) {
                    if (xhrDrive.status === 200) {
                        var data = JSON.parse(xhrDrive.responseText);
                        if (data.files && data.files.length > 0) {
                            images = [];
                            for (var i = 0; i < data.files.length; i++) {
                                images.push('https://drive.google.com/thumbnail?id=' + data.files[i].id + '&sz=w2048');
                            }
                            for (var k = images.length - 1; k > 0; k--) {
                                var j = Math.floor(Math.random() * (k + 1));
                                var temp = images[k]; images[k] = images[j]; images[j] = temp;
                            }
                            initSlideshow();
                        }
                    } else { setTimeout(fetchImagesFromDrive, 5000); }
                }
            };
            xhrDrive.send();
        }

        function initSlideshow() {
            document.getElementById('bg1').src = images[0];
            document.getElementById('fg1').src = images[0];
            changeIntervalMode(currentActiveMode);
        }

        function changeIntervalMode(modeVal) {
            currentActiveMode = modeVal;
            var seconds = stepSeconds[modeVal];
            
            var btns = document.querySelectorAll('.speed-btn');
            for (var i = 0; i < btns.length; i++) {
                if ((i + 1) === modeVal) btns[i].classList.add('active'); else btns[i].classList.remove('active');
            }

            if (slideInterval) clearInterval(slideInterval);
            updateDynamicContentBySlide(currentIndex);

            slideInterval = setInterval(function() {
                var nextIndex = (currentIndex + 1) % images.length;
                
                var currentGroup = document.getElementById(isGroup1Active ? 'group1' : 'group2');
                var nextGroup = document.getElementById(isGroup1Active ? 'group2' : 'group1');
                var nextBg = document.getElementById(isGroup1Active ? 'bg2' : 'bg1');
                var nextFg = document.getElementById(isGroup1Active ? 'fg2' : 'fg1');
                var textZone = document.getElementById('text-fade-zone');

                // Làm mờ chữ trước khi đổi ảnh
                textZone.classList.add('hidden');

                nextFg.onload = function() {
                    currentGroup.classList.remove('active');
                    nextGroup.classList.add('active');
                    isGroup1Active = !isGroup1Active;
                    currentIndex = nextIndex;
                    
                    // Cập nhật nội dung mới và làm sáng chữ lên lại đồng bộ
                    updateDynamicContentBySlide(currentIndex);
                    textZone.classList.remove('hidden');
                };
                nextBg.src = images[nextIndex];
                nextFg.src = images[nextIndex];
            }, seconds * 1000);
        }

        fetchImagesFromDrive();
    </script>
</body>
</html>
