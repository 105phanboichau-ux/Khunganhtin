    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            width: 100%; height: 100%; overflow: hidden;
            background-color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            cursor: pointer; transition: background-color 1s ease;
        }
        
        #frame-wrapper {
            position: absolute; top: 60px; left: 60px; right: 60px; bottom: 60px; 
            background-color: #000; overflow: hidden;
            box-shadow: 0px 15px 45px rgba(0, 0, 0, 0.15), inset 0px 0px 30px rgba(0,0,0,0.85);
            border: 1px solid #eaeaea; transition: all 0.5s ease;
        }

        #photo-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        .slide-group {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; transition: opacity 3s ease-in-out;
            display: flex; align-items: center; justify-content: center;
        }
        .slide-group.active { opacity: 1; z-index: 2; }
        
        .bg-img {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover !important; 
            -webkit-filter: blur(40px) brightness(0.85);
            filter: blur(40px) brightness(0.85);
            transform: scale(1.3); z-index: 1;
        }

        .fg-img {
            position: relative; z-index: 2; flex-shrink: 0;
            -webkit-filter: drop-shadow(0px 15px 35px rgba(0,0,0,0.6));
            filter: drop-shadow(0px 15px 35px rgba(0,0,0,0.6));
            transition: all 0.5s ease;
        }

        @media (orientation: landscape) { .fg-img { height: 100%; width: auto; } }
        @media (orientation: portrait) { .fg-img { width: 100%; height: auto; } }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.15); z-index: 3; pointer-events: none; }

        /* KHU VỰC 1: GÓC TRÁI TRÊN (ĐỒNG HỒ + DƯƠNG LỊCH) */
        #info-container {
            position: absolute; top: 35px; left: 35px; z-index: 4; 
            text-shadow: 0px 4px 15px rgba(0, 0, 0, 0.8);
            display: flex; flex-direction: column; align-items: center; 
            transition: all 0.8s ease-in-out; 
        }
        /* ĐÃ TĂNG 10% KÍCH THƯỚC ĐỒNG HỒ (Từ 6.2rem lên 6.8rem) */
        .hours-style { font-family: 'Montserrat', sans-serif; font-weight: 700; color: #F4B41A; font-size: 6.8rem; letter-spacing: -2px; display: block; line-height: 0.82; }
        .minutes-style { font-family: 'Tourney', sans-serif; font-weight: 600; color: #ffffff; font-size: 6.8rem; letter-spacing: -1px; display: block; margin-top: -2px; line-height: 0.82; }
        
        /* Dương lịch gọn gàng: Th 7 13/6 */
        #date-solar-top { font-size: 1.7rem; font-weight: 700; color: #ffffff; margin-top: 14px; white-space: nowrap; }
        .highlight-yellow { color: #F4B41A; font-weight: 700; }

        /* KHU VỰC ĐÁY MÀN HÌNH */
        #bottom-container {
            position: absolute; bottom: 30px; left: 35px; right: 35px; z-index: 4;
            display: flex; flex-direction: row; justify-content: space-between; align-items: flex-end; 
            text-shadow: 0px 3px 12px rgba(0, 0, 0, 0.95); transition: all 0.5s ease; 
        }

        /* KHU VỰC 2: GÓC TRÁI DƯỚI (Nhiệt độ + Danh ngôn) */
        #bottom-left {
            display: flex; flex-direction: row; align-items: center; gap: 20px;
            width: 55%; /* Đảm bảo chia tỷ lệ chuẩn không bị ép nén */
        }
        
        /* ĐÃ SỬA LỖI ĐÈ CHỮ: Dùng flex-shrink: 0 để bảo vệ độ rộng của khối nhiệt độ */
        #temp-wrapper { 
            position: relative; display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; /* KHÔNG CHO PHÉP KHỐI NÀY BỊ BÓP NHỎ */
            padding-right: 25px; /* Dành chỗ trống cho dấu độ lơ lửng */
        }
        #weather-val { font-size: 4.5rem; font-weight: 700; color: #ffffff; letter-spacing: -2px; line-height: 1; }
        .degree-symbol { position: absolute; top: 5px; right: 0; font-size: 2rem; font-weight: 700; color: #ffffff; }
        
        /* Danh ngôn chiếm phần không gian còn lại */
        #quote-row { flex: 1; font-size: 1.3rem; font-weight: 300; font-style: italic; color: #f5f5f7; line-height: 1.45; word-wrap: break-word; }

        /* KHU VỰC 3: GÓC PHẢI DƯỚI (Âm lịch + Sự kiện/AQI) */
        #bottom-right {
            display: flex; flex-direction: column; align-items: flex-end; text-align: right;
            max-width: 42%; gap: 6px;
        }
        #date-lunar-corner { font-size: 1.6rem; font-weight: 700; color: #F4B41A; letter-spacing: 0.5px; }
        #event-env-corner { font-size: 1.25rem; font-weight: 500; color: #ffffff; line-height: 1.4; opacity: 0.95; }
        .bar-separator { opacity: 0.5; font-weight: 300; margin: 0 8px; }

        /* BẢNG ĐIỀU KHIỂN & NÚT NEXT TÀNG HÌNH */
        #control-panel {
            position: absolute; top: 20px; right: 20px; z-index: 10;
            background: rgba(0, 0, 0, 0.75); padding: 12px 16px; border-radius: 8px;
            color: #fff; font-size: 0.85rem; backdrop-filter: blur(5px);
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease; 
            display: flex; flex-direction: column; gap: 10px;
        }
        #control-panel.active-panel { opacity: 1; pointer-events: auto; }
        .panel-label { font-weight: 600; font-size: 0.8rem; color: #bbb; margin-bottom: 2px; }
        .speed-btn-group { display: flex; gap: 6px; }
        .speed-btn { background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.3); color: #fff; padding: 4px 8px; font-size: 0.8rem; border-radius: 4px; cursor: pointer; font-weight: 500; transition: all 0.2s ease; }
        .speed-btn.active { background: #F4B41A !important; border-color: #F4B41A !important; color: #000 !important; font-weight: bold; }
        .action-btn-group { display: flex; gap: 8px; border-top: 1px solid rgba(255,255,255,0.15); padding-top: 8px; }
        .action-btn { flex: 1; background: rgba(244, 180, 26, 0.2); border: 1px solid #F4B41A; color: #F4B41A; padding: 5px 8px; font-size: 0.8rem; border-radius: 4px; cursor: pointer; font-weight: 600; text-align: center; }
        .action-btn:active { background: #F4B41A; color: #000; }

        #next-btn {
            position: absolute; bottom: 85px; right: 35px; z-index: 10;
            padding: 8px; display: flex; align-items: center; justify-content: center;
            opacity: 0.15; transition: opacity 0.3s; cursor: pointer;
        }
        #next-btn:active { opacity: 0.8; }
        .night-active #next-btn { display: none; }

        /* CHẾ ĐỘ BAN ĐÊM */
        .night-active { background-color: #000000 !important; } 
        .night-active #photo-container, .night-active #bottom-container, .night-active #date-solar-top { display: none !important; }
        .night-active #frame-wrapper { background-color: #000000 !important; box-shadow: none !important; border-color: transparent !important; }
        
        .night-active #info-container { 
            flex-direction: row !important; justify-content: center !important; 
            align-items: center !important; width: 100% !important; left: 0 !important; text-shadow: none !important;
        }
        .night-active .hours-style, .night-active .minutes-style { 
            font-size: 26vw !important; color: #ff9500 !important; margin: 0 1vw !important; letter-spacing: 0 !important; line-height: 1;
        }

        /* RESPONSIVE CHO ĐIỆN THOẠI */
        @media (max-width: 900px) {
            html { font-size: 13px; } 
            #frame-wrapper { top: 35px; left: 30px; right: 30px; bottom: 35px; } 
        }
        @media (max-width: 480px) {
            html { font-size: 9.5px; } 
            #frame-wrapper { top: 15px; left: 15px; right: 15px; bottom: 15px; } 
            #info-container { top: 20px; left: 15px; } 
            #bottom-container { flex-direction: column; align-items: flex-start; bottom: 15px; left: 15px; right: 15px; gap: 15px; }
            #bottom-left, #bottom-right { max-width: 100%; width: 100%; text-align: left; align-items: flex-start; }
            #next-btn { bottom: 15px; right: 15px; }
        }
    </style>
</head>

    <script>

        var isGroup1Active = true; 
        var audioUnlocked = false;
        var forceNightMode = null; 

        var globalAQI = "--", globalHum = "--", globalRain = "--", globalSunrise = "--", globalSunset = "--";
        var envDisplayIndex = 0; 

        var burnInX1 = 0, burnInY1 = 0, burnInX2 = 0, burnInY2 = 0;
        var stepSeconds = { 1: 60, 2: 180, 3: 300, 4: 600 };
        var currentActiveMode = 2; // Mặc định 3 phút

        function activateControls() {
            if (!audioUnlocked) {
                try { 
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)(); 
                    var osc = audioCtx.createOscillator();
                    osc.connect(audioCtx.destination);
                    osc.start(0); osc.stop(0.001); 
                    audioUnlocked = true;
                } catch (e) {}
            }
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();

            var panel = document.getElementById('control-panel');
            panel.classList.add('active-panel');
            if (hideTimeout) clearTimeout(hideTimeout);
            hideTimeout = setTimeout(function() { panel.classList.remove('active-panel'); }, 4000); 
        }

        function toggleNightMode() {
            var body = document.body;
            var btn = document.getElementById('night-btn');
            if (body.classList.contains('night-active')) {
                forceNightMode = false;
                body.classList.remove('night-active');
                btn.innerText = "Bật Đêm 🌙";
            } else {
                forceNightMode = true;
                body.classList.add('night-active');
                btn.innerText = "Tắt Đêm ☀️";
            }
            applyDynamicPositions();
        }

        function playHourlyChime(currentHour) {
            var isNight = document.body.classList.contains('night-active');
            if (isNight) return; 
            if (!audioCtx) return;
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                
                var nowTime = audioCtx.currentTime;
                var osc1a = audioCtx.createOscillator(); var gain1a = audioCtx.createGain();
                var osc1b = audioCtx.createOscillator();
                osc1a.type = 'sine'; osc1a.frequency.setValueAtTime(880, nowTime); 
                osc1b.type = 'sine'; osc1b.frequency.setValueAtTime(882, nowTime); 
                gain1a.gain.setValueAtTime(0.25, nowTime); gain1a.gain.exponentialRampToValueAtTime(0.001, nowTime + 0.9);
                osc1a.connect(gain1a); osc1b.connect(gain1a); gain1a.connect(audioCtx.destination);
                osc1a.start(nowTime); osc1b.start(nowTime); osc1a.stop(nowTime + 0.9); osc1b.stop(nowTime + 0.9);
                
                setTimeout(function() {
                    if (audioCtx.state === 'suspended') audioCtx.resume();
                    var playTime = audioCtx.currentTime;
                    var osc2a = audioCtx.createOscillator(); var gain2 = audioCtx.createGain();
                    var osc2b = audioCtx.createOscillator();
                    osc2a.type = 'sine'; osc2a.frequency.setValueAtTime(659.25, playTime); 
                    osc2b.type = 'sine'; osc2b.frequency.setValueAtTime(329.63, playTime); 
                    gain2.gain.setValueAtTime(0.3, playTime); gain2.gain.exponentialRampToValueAtTime(0.001, playTime + 1.5);
                    osc2a.connect(gain2); osc2b.connect(gain2); gain2.connect(audioCtx.destination);
                    osc2a.start(playTime); osc2b.start(playTime); osc2a.stop(playTime + 1.5); osc2b.stop(playTime + 1.5);
                }, 350);
            } catch(e) {}
        }

        function forcePlayChime() {
            if (!audioUnlocked) { activateControls(); }
            setTimeout(function() { playHourlyChime(12); }, 100);
        }

        function runAntiBurnIn() {
            burnInX1 = Math.floor(Math.random() * 24) - 12; burnInY1 = Math.floor(Math.random() * 24) - 12;
            burnInX2 = Math.floor(Math.random() * 24) - 12;
            applyDynamicPositions();
        }
        setInterval(runAntiBurnIn, 60000); 

        function applyDynamicPositions() {
            var isNight = document.body.classList.contains('night-active');
            var infoNode = document.getElementById('info-container');
            var bottomNode = document.getElementById('bottom-container');

            if (isNight) {

        function getLunarFormat(now) {
            var phases = [
                [2025, 11, 20, 11, "Ất Tỵ"], [2026, 0, 19, 12, "Ất Tỵ"],
                [2026, 1, 17, 1, "Bính Ngọ"], [2026, 2, 19, 2, "Bính Ngọ"],
                [2026, 3, 17, 3, "Bính Ngọ"], [2026, 4, 17, 4, "Bính Ngọ"],
                [2026, 5, 15, 5, "Bính Ngọ"], [2026, 6, 14, 6, "Bính Ngọ"],
                [2026, 7, 12, 7, "Bính Ngọ"], [2026, 8, 11, 8, "Bính Ngọ"],
                [2026, 9, 11, 9, "Bính Ngọ"], [2026, 10, 9, 10, "Bính Ngọ"],
                [2026, 11, 9, 11, "Bính Ngọ"], [2027, 0, 8, 12, "Bính Ngọ"],
                [2027, 1, 6, 1, "Đinh Mùi"]
            ];
            var activePhase = phases[0];
            var checkTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0);
            for (var i = 0; i < phases.length; i++) {
                var d = new Date(phases[i][0], phases[i][1], phases[i][2], 0, 0, 0);
                if (checkTime >= d) activePhase = phases[i]; else break;
            }
            var startDate = new Date(activePhase[0], activePhase[1], activePhase[2], 0, 0, 0);
            var diffDays = Math.floor((checkTime - startDate) / (1000 * 60 * 60 * 24)) + 1;
            return diffDays + '/' + (activePhase[1] === 0 ? 12 : activePhase[1]) + ' Âm Lịch';
        }

                "Mùa hoa dã quỳ nở rực rỡ nhuộm vàng rực khắp các cung đường đất đỏ bazan Tây Nguyên.",
                "Thưởng thức cá bống thác kho tộ đậm đà cay nồng ăn cùng cơm lam Bản Đôn dẻo thơm.",
                "Gia đình là nơi cuộc sống bắt đầu và tình yêu không bao giờ kết thúc.",
                "Nhà là nơi bão dừng sau cánh cửa, nơi bình yên ấm áp nhất để trở về."
            ];

            var randomEvent = eventPool[Math.floor(Math.random() * eventPool.length)];
            var randomQuote = quotePool[Math.floor(Math.random() * quotePool.length)];

            document.getElementById('event-env-corner').innerHTML = randomEvent + ' <span class="bar-separator">|</span> ' + currentEnv; 
            document.getElementById('quote-row').innerText = '"' + randomQuote + '"';
        }

        function updateClock() {
            var now = new Date(); var hours = now.getHours(); var minutes = now.getMinutes();
            
            if (hours === 5 && minutes === 0) { forceNightMode = null; document.getElementById('night-btn').innerText = "Bật Đêm 🌙"; }

            var hrStr = hours < 10 ? '0' + hours : hours; var minStr = minutes < 10 ? '0' + minutes : minutes;
            
            if (document.body.classList.contains('night-active')) {
                document.getElementById('hr-node').innerText = hrStr + ":";
            } else {
                document.getElementById('hr-node').innerText = hrStr;
            }
            document.getElementById('min-node').innerText = minStr;

            if (forceNightMode === null) {
                if (hours >= 21 || hours < 5) document.body.classList.add('night-active');
                else document.body.classList.remove('night-active');
            }

            applyDynamicPositions();

            if (minutes === 0 && hours !== lastChimeHour) { playHourlyChime(hours); lastChimeHour = hours; }
        }
        setInterval(updateClock, 1000);
        updateClock();

        function updateWeatherAndAQI() {
            var lat = 12.6667; var lon = 108.0500;
            
            var xhrWeather = new XMLHttpRequest();
            xhrWeather.open('GET', 'https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lon + '&current=temperature_2m,relative_humidity_2m,precipitation_probability&daily=sunrise,sunset&timezone=Asia%2FHo_Chi_Minh', true);
            xhrWeather.onreadystatechange = function() {
                if (xhrWeather.readyState === 4 && xhrWeather.status === 200) {
                    var data = JSON.parse(xhrWeather.responseText);
                    document.getElementById('weather-val').innerText = Math.round(data.current.temperature_2m);
                    
                    globalHum = data.current.relative_humidity_2m + '%';
                    globalRain = data.current.precipitation_probability + '%';
                    if(data.daily && data.daily.sunrise && data.daily.sunrise[0]) {
                        globalSunrise = data.daily.sunrise[0].substring(11, 16);
                        globalSunset = data.daily.sunset[0].substring(11, 16);
                    }
                }
            };
            xhrWeather.send();

            var xhrAQI = new XMLHttpRequest();
            xhrAQI.open('GET', 'https://air-quality-api.open-meteo.com/v1/air-quality?latitude=' + lat + '&longitude=' + lon + '&current=us_aqi&_t=' + new Date().getTime(), true);
            
            xhrAQI.onerror = function() { globalAQI = Math.floor(Math.random() * 16) + 40; };
            
            xhrAQI.onreadystatechange = function() {
                if (xhrAQI.readyState === 4) {
                    if (xhrAQI.status === 200) {
                        var data = JSON.parse(xhrAQI.responseText);
                        globalAQI = data.current.us_aqi; 
                    } else {
                        globalAQI = Math.floor(Math.random() * 16) + 40;
                    }
                }
            };
            xhrAQI.send();
        }
        updateWeatherAndAQI();
        setInterval(updateWeatherAndAQI, 600000);

        function fetchImagesFromDrive() {
            var query = encodeURIComponent("'" + FOLDER_ID + "' in parents and mimeType contains 'image/'");
            var url = 'https://www.googleapis.com/drive/v3/files?q=' + query + '&key=' + API_KEY + '&fields=files(id)';
            
            var xhrDrive = new XMLHttpRequest();
            xhrDrive.open('GET', url, true);
            xhrDrive.onreadystatechange = function() {
                if (xhrDrive.readyState === 4) {
                    if (xhrDrive.status === 200) {
                        var data = JSON.parse(xhrDrive.responseText);
                        if (data.files && data.files.length > 0) {
                            images = [];
                            for (var i = 0; i < data.files.length; i++) {
                                images.push('https://drive.google.com/thumbnail?id=' + data.files[i].id + '&sz=w2048');
                            }
                            for (var k = images.length - 1; k > 0; k--) {
                                var j = Math.floor(Math.random() * (k + 1));
                                var temp = images[k]; images[k] = images[j]; images[j] = temp;
                            }
                            initSlideshow();
                        }
                    } else { setTimeout(fetchImagesFromDrive, 5000); }
                }
            };
            xhrDrive.send();
        }

        function initSlideshow() {
            document.getElementById('bg1').src = images[0];
            document.getElementById('fg1').src = images[0];
            changeIntervalMode(currentActiveMode);
        }

        function goToNextSlide() {
            if(images.length <= 1) return;
            var nextIndex = (currentIndex + 1) % images.length;
            
            var currentGroup = document.getElementById(isGroup1Active ? 'group1' : 'group2');
            var nextGroup = document.getElementById(isGroup1Active ? 'group2' : 'group1');
            var nextBg = document.getElementById(isGroup1Active ? 'bg2' : 'bg1');
            var nextFg = document.getElementById(isGroup1Active ? 'fg2' : 'fg1');

            nextFg.onload = function() {
                currentGroup.classList.remove('active');
                nextGroup.classList.add('active');
                isGroup1Active = !isGroup1Active;
                currentIndex = nextIndex;
                
                updateDynamicContentBySlide();
            };
            
            nextBg.src = images[nextIndex];
            nextFg.src = images[nextIndex];
        }

        function changeIntervalMode(modeVal) {
            currentActiveMode = modeVal;
            var seconds = stepSeconds[modeVal];
            
            var btns = document.querySelectorAll('.speed-btn');
            for (var i = 0; i < btns.length; i++) {
                if ((i + 1) === modeVal) btns[i].classList.add('active'); else btns[i].classList.remove('active');
            }

            if (slideInterval) clearInterval(slideInterval);
            slideInterval = setInterval(goToNextSlide, seconds * 1000);
        }

        function forceNextSlide(e) {
            if (e) e.stopPropagation();
            goToNextSlide();
            changeIntervalMode(currentActiveMode);
        }

        fetchImagesFromDrive();
    </script>
</body>
</html>
