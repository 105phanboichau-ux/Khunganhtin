<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>Khung Ảnh Số Nghệ Thuật</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Tourney:wght@600&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            width: 100%; height: 100%; overflow: hidden;
            background-color: #ffffff; /* ĐÃ ĐỔI: Khung viền ngoài màu trắng tinh khôi chuẩn Matte Gallery cao cấp */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            cursor: pointer;
            transition: background-color 1s ease;
        }
        
        /* KHUNG VIỀN TRANH BẢN DÀY 60PX ĐỐI XỨNG HOÀN HẢO TUYỆT ĐỐI 4 CẠNH */
        #frame-wrapper {
            position: absolute;
            top: 60px; left: 60px; right: 60px; bottom: 60px; /* Dày đều chập chặn 60px bốn góc */
            background-color: #000; overflow: hidden;
            /* ĐÃ NÂNG CẤP: Hiệu ứng đổ bóng dập nổi 3D lồng kính tạo độ sâu hút hồn cho ảnh */
            box-shadow: 0px 15px 45px rgba(0, 0, 0, 0.20), 0px 2px 10px rgba(0, 0, 0, 0.1), inset 0px 0px 20px rgba(0,0,0,0.4);
            border: 1px solid rgba(0, 0, 0, 0.08);
            transition: all 1s ease;
        }

        #photo-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* CƠ CHẾ ĐỆM KÉP (DOUBLE BUFFER): Chỉ dùng đúng 2 thẻ ảnh luân phiên bảo vệ RAM iPad 4 tuyệt đối */
        .slide {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover !important; opacity: 0; transition: opacity 4s ease-in-out; /* Chuyển cảnh chậm cinematic */
        }
        .slide.active { opacity: 1; z-index: 2; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.18); z-index: 3; }

        /* KHỐI ĐỒNG HỒ (Ban ngày: Góc trên trái | Ban đêm: Tự nhảy ra giữa màn hình) */
        #info-container {
            position: absolute; top: 40px; left: 40px; z-index: 4; color: #ffffff;
            text-shadow: 0px 4px 15px rgba(0, 0, 0, 0.7);
            display: flex; flex-direction: column; align-items: center; text-align: center;
            transition: transform 0.5s ease-out, top 0.8s ease-in-out, left 0.8s ease-in-out; 
        }
        #time { font-size: 8.5rem; line-height: 0.9; display: flex; align-items: center; justify-content: center; gap: 15px; }
        .hours-style { font-family: 'Montserrat', sans-serif; font-weight: 700; color: #F4B41A; letter-spacing: -2px; transition: color 0.8s ease; }
        .minutes-style { font-family: 'Tourney', sans-serif; font-weight: 600; color: #ffffff; letter-spacing: -1px; }
        #date-wrapper { margin-top: 15px; display: flex; flex-direction: column; align-items: center; }
        #date { font-size: 2.4rem; font-weight: 700; color: #ffffff; transition: color 0.8s ease; }
        #lunar-date { font-size: 1.8rem; font-weight: 400; color: #e0e0e0; margin-top: 6px; line-height: 1.3; transition: color 0.8s ease; }

        /* KHỐI ĐA NĂNG ĐÁY MÀN HÌNH: CĂN GIỮA ĐỒNG TRỤC TUYỆT ĐỐI, ĐẨY SÁT ĐÁY VIỀN 15PX */
        #bottom-container {
            position: absolute; bottom: 15px; left: 0; right: 0; width: 100%; z-index: 4;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            gap: 12px; padding: 0 30px;
            text-shadow: 0px 3px 12px rgba(0, 0, 0, 0.95); transition: transform 0.5s ease-out; 
        }
        
        /* ĐÃ SỬA: Dòng 1 - Câu danh ngôn tự động xuống dòng mượt mà khi quá dài, căn giữa hoàn hảo */
        #quote-container { width: 100%; text-align: center; display: flex; justify-content: center; }
        #quote-text { 
            font-size: 1.4rem; font-weight: 300; font-style: italic; color: #f5f5f7; 
            white-space: normal !important; /* Cho phép xuống hàng tự do */
            word-wrap: break-word; display: block; max-width: 85%; line-height: 1.45; text-align: center;
        }
        
        /* ĐÃ SỬA: Dòng 2 - Thanh trạng thái căn giữa đồng trục hoàn toàn trên cả màn hình ngang/dọc */
        #status-container { 
            width: 100%; display: flex; flex-direction: row; flex-wrap: wrap;
            align-items: center; justify-content: center; gap: 20px; font-size: 1.5rem; color: #ffffff; 
        }
        #weather-temp { font-size: 2.4rem; font-weight: 700; }
        #aqi-badge { font-size: 1.4rem; font-weight: 700; padding: 3px 10px; border-radius: 5px; white-space: nowrap; text-shadow: none; display: inline-block; transition: background-color 0.5s ease, color 0.5s ease; }
        #countdown-text { white-space: nowrap; }
        .bar-separator { opacity: 0.4; font-weight: 300; color: #ffffff; }

        /* BẢNG PHÍM BẤM THỜI GIAN NHỎ ĐẸP TINH GIẢN */
        #control-panel {
            position: absolute; top: 20px; right: 20px; z-index: 10;
            background: rgba(0, 0, 0, 0.65); padding: 10px 14px; border-radius: 8px;
            color: #fff; font-size: 0.85rem; backdrop-filter: blur(5px);
            opacity: 0.2; transition: opacity 0.3s ease; display: flex; flex-direction: column; gap: 6px;
        }
        #control-panel.active-panel, #control-panel:hover { opacity: 1 !important; }
        .speed-btn-group { display: flex; gap: 6px; }
        .speed-btn { background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.3); color: #fff; padding: 4px 8px; font-size: 0.8rem; border-radius: 4px; cursor: pointer; font-weight: 500; transition: all 0.2s ease; }
        .speed-btn.active { background: #F4B41A !important; border-color: #F4B41A !important; color: #000 !important; font-weight: bold; }

        /* ĐÃ KIỂM TRA CHUẨN XÁC: CHẾ ĐỘ BAN ĐÊM TỰ ĐỘNG (21:00 TỐI - 05:00 SÁNG HÔM SAU) */
        .night-active { background-color: #000000 !important; } /* Đêm xuống viền trắng tự động biến thành đen kịt để không chói mắt ngủ */
        .night-active #photo-container, .night-active #bottom-container { display: none !important; }
        .night-active #frame-wrapper { background-color: #000000 !important; box-shadow: none !important; border-color: transparent !important; }
        .night-active .overlay { background: rgba(0, 0, 0, 1) !important; }
        .night-active .hours-style { color: #ffffff !important; } /* Đồng hồ chuyển hoàn toàn sang màu TRẮNG tinh khôi ra giữa tâm máy */
        .night-active #date, .night-active #lunar-date { color: #aaaaaa !important; }
        .night-active #info-container { text-shadow: none !important; }
    </style>
</head>
<body ontouchstart="activateControls()" onclick="activateControls()">

    <div id="frame-wrapper">
        <div id="photo-container">
            <img id="slide1" class="slide active">
            <img id="slide2" class="slide">
        </div>
        <div class="overlay"></div>

        <div id="info-container">
            <div id="time"><span class="hours-style">00</span><span class="minutes-style">00</span></div>
            <div id="date-wrapper"><div id="date">Thứ 0 00-00</div><div id="lunar-date">AL --/-- <br>----</div></div>
        </div>

        <div id="bottom-container">
            <div id="quote-container"><span id="quote-text">Đang tải dữ liệu đặc sản vùng miền...</span></div>
            
            <div id="status-container">
                <span id="weather-temp">--°C</span>
                <span class="bar-separator">|</span>
                <span id="aqi-badge">AQI: --</span>
                <span class="bar-separator">|</span>
                <span id="countdown-text">Đang tính lịch sự kiện...</span>
            </div>
        </div>

        <div id="control-panel" onclick="event.stopPropagation();" ontouchstart="event.stopPropagation();">
            <div style="font-weight: 600; font-size: 0.75rem; color: #ccc;">Thời gian đổi ảnh:</div>
            <div class="speed-btn-group">
                <button class="speed-btn" id="speed-1" onclick="changeIntervalMode(1)">1 Phút</button>
                <button class="speed-btn" id="speed-2" onclick="changeIntervalMode(2)">3 Phút</button>
                <button class="speed-btn" id="speed-3" onclick="changeIntervalMode(3)">5 Phút</button>
                <button class="speed-btn" id="speed-4" onclick="changeIntervalMode(4)">10 Phút</button>
            </div>
        </div>
    </div>

    <script>
        const SECRET_ENCODED = 'QUl6YVN5REwyRm1VQzkxMUtBTnFwN3VPbnZKcU5xVHltb1R2SkxF';
        const API_KEY = atob(SECRET_ENCODED);
        const FOLDER_ID = '1r1WUIKwAPAnsyIh-Zot7AevEW0uEZ-Hl'; 

        let images = [];
        let currentIndex = 0;
        let slideInterval;
        let hideTimeout;
        let lastChimeHour = -1;
        let audioCtx = null; 
        let isSlide1Active = true; 

        let burnInX1 = 0, burnInY1 = 0;
        let burnInX2 = 0, burnInY2 = 0;

        const stepSeconds = { 1: 60, 2: 180, 3: 300, 4: 600 };
        let currentActiveMode = 2; // Khởi tạo mặc định chọn mốc 3 Phút

        function activateControls() {
            if (!audioCtx) {
                try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
            }
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();

            const panel = document.getElementById('control-panel');
            panel.classList.add('active-panel');
            if (hideTimeout) clearTimeout(hideTimeout);
            hideTimeout = setTimeout(() => panel.classList.remove('active-panel'), 3000);
        }

        function runAntiBurnIn() {
            burnInX1 = Math.floor(Math.random() * 24) - 12; 
            burnInY1 = Math.floor(Math.random() * 24) - 12;
            burnInX2 = Math.floor(Math.random() * 24) - 12;
            applyDynamicPositions();
        }
        setInterval(runAntiBurnIn, 60000); 

        function applyDynamicPositions() {
            const now = new Date();
            const hours = now.getHours();
            const isNightMode = (hours >= 21 || hours < 5); 

            const infoNode = document.getElementById('info-container');
            const bottomNode = document.getElementById('bottom-container');

            if (isNightMode) {
                infoNode.style.top = "50%"; infoNode.style.left = "50%";
                infoNode.style.transform = "translate(-50%, -50%) translate(" + burnInX1 + "px, " + burnInY1 + "px)";
            } else {
                infoNode.style.top = "40px"; infoNode.style.left = "40px";
                infoNode.style.transform = "translate(" + burnInX1 + "px, " + burnInY1 + "px)";
            }
            if (bottomNode) bottomNode.style.transform = "translate(" + burnInX2 + "px, " + burnInY2 + "px)";
        }

        // ĐÃ KIỂM TRA: TIẾNG CHUÔNG BÁO GIỜ ĐINH-ĐOONG CHẠY CHUẨN XÁC, TỰ MUTE BAN ĐÊM
        function playHourlyChime(currentHour) {
            if (currentHour < 6 || currentHour >= 21 || !audioCtx) return;
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc1 = audioCtx.createOscillator();
                const gain1 = audioCtx.createGain();
                osc1.type = 'sine'; osc1.frequency.setValueAtTime(880, audioCtx.currentTime); 
                gain1.gain.setValueAtTime(0.18, audioCtx.currentTime);
                gain1.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);
                osc1.connect(gain1); gain1.connect(audioCtx.destination);
                osc1.start(); osc1.stop(audioCtx.currentTime + 0.8);
                
                setTimeout(() => {
                    if (audioCtx.state === 'suspended') audioCtx.resume();
                    const osc2 = audioCtx.createOscillator();
                    const gain2 = audioCtx.createGain();
                    osc2.type = 'sine'; osc2.frequency.setValueAtTime(659.25, audioCtx.currentTime); 
                    gain2.gain.setValueAtTime(0.18, audioCtx.currentTime);
                    gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.2);
                    osc2.connect(gain2); gain2.connect(audioCtx.destination);
                    osc2.start(); osc2.stop(audioCtx.currentTime + 1.2);
                }, 350);
            } catch(e) {}
        }

        function calculateLunarHtml(now) {
            const phases = [
                [2025, 11, 20, 11, "Ất Tỵ"], [2026, 0, 19, 12, "Ất Tỵ"],
                [2026, 1, 17, 1, "Bính Ngọ"], [2026, 2, 19, 2, "Bính Ngọ"],
                [2026, 3, 17, 3, "Bính Ngọ"], [2026, 4, 17, 4, "Bính Ngọ"],
                [2026, 5, 15, 5, "Bính Ngọ"], [2026, 6, 14, 6, "Bính Ngọ"],
                [2026, 7, 12, 7, "Bính Ngọ"], [2026, 8, 11, 8, "Bính Ngọ"],
                [2026, 9, 11, 9, "Bính Ngọ"], [2026, 10, 9, 10, "Bính Ngọ"],
                [2026, 11, 9, 11, "Bính Ngọ"], [2027, 0, 8, 12, "Bính Ngọ"],
                [2027, 1, 6, 1, "Đinh Mùi"]
            ];
            let activePhase = phases[0];
            const checkTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0);
            for (let i = 0; i < phases.length; i++) {
                const d = new Date(phases[i][0], phases[i][1], phases[i][2], 0, 0, 0);
                if (checkTime >= d) activePhase = phases[i];
                else break;
            }
            const startDate = new Date(activePhase[0], activePhase[1], activePhase[2], 0, 0, 0);
            const diffDays = Math.floor((checkTime - startDate) / (1000 * 60 * 60 * 24)) + 1;
            return `AL ${diffDays}-${activePhase[3]}<br><span style="font-size: 1.4rem; opacity: 0.8; font-weight:300;">Năm ${activePhase[4]}</span>`;
        }

        // ĐÃ SỬA TRIỆT ĐỂ: Gỡ sạch tên biến tiếng Việt có dấu, cam kết 100% không đứng chữ trên iPad 4
        function updateDynamicContentBySlide(indexSeed) {
            const now = new Date();
            const targetTetAm = new Date(2027, 1, 6); 
            const targetNoel = new Date(2026, 11, 25);
            const targetTetDuong = new Date(2027, 0, 1);
            const targetQuocKhanh = new Date(2026, 8, 2);
            const targetPhatDan = new Date(2026, 4, 31); // Đã chuẩn hóa ASCII an toàn
            const targetTrungThu = new Date(2026, 8, 25); 

            const daysToTetAm = Math.ceil((targetTetAm - now) / (1000 * 60 * 60 * 24));
            const daysToNoel = Math.ceil((targetNoel - now) / (1000 * 60 * 60 * 24));
            const daysToTetDuong = Math.ceil((targetTetDuong - now) / (1000 * 60 * 60 * 24));
            const daysToQuocKhanh = Math.ceil((targetQuocKhanh - now) / (1000 * 60 * 60 * 24));
            const daysToPhatDan = Math.ceil((targetPhatDan - now) / (1000 * 60 * 60 * 24));
            const daysToTrungThu = Math.ceil((targetTrungThu - now) / (1000 * 60 * 60 * 24));

            const eventPool = [];
            if (daysToTetAm > 0) eventPool.push(`🧧 Còn ${daysToTetAm} ngày đến Tết Nguyên Đán Đinh Mùi 2027`);
            if (daysToTetDuong > 0) eventPool.push(`🌸 Còn ${daysToTetDuong} ngày đến Đại lễ Tết Dương Lịch 2027`);
            if (daysToNoel > 0) eventPool.push(`🎄 Còn ${daysToNoel} ngày đến Đại lễ Giáng Sinh Thiên Chúa Giáo`);
            if (daysToTrungThu > 0) eventPool.push(`🥮 Còn ${daysToTrungThu} ngày đến Tết Trung Thu rước đèn phá cỗ`);
            if (daysToPhatDan > 0) eventPool.push(`🙏 Còn ${daysToPhatDan} ngày đến Đại lễ Phật Đản bên Phật Giáo (15/4 AL)`);
            if (daysToQuocKhanh > 0) eventPool.push(`🇨🇳 Còn ${daysToQuocKhanh} ngày đến Đại lễ Quốc Khánh Việt Nam 2/9`);
            
            eventPool.push("🌕 Sắp đến ngày Rằm Âm Lịch hằng tháng - Thành kính hướng về tổ tiên");
            eventPool.push("🌱 Sắp đến ngày Mùng 1 Âm Lịch đầu tháng - Khởi đầu tháng mới bình an");
            eventPool.push("☕ Thác Dray Nur Đắk Lắk mùa này nước đổ tung bọt trắng xóa vĩ đại");
            eventPool.push("🏮 Đón chờ mùa Lễ hội Đua voi Bản Đôn Đắk Lắk đậm đà bản sắc đại ngàn");
            eventPool.push("⛪ Sắp đến kỳ lễ Phục Sinh thanh khiết trang nghiêm bên Thiên Chúa Giáo");
            eventPool.push("🌾 Sắp đến mùa Lễ mừng lúa mới đón vụ mùa ấm no của đồng bào Ê Đê");
            eventPool.push("⛵ Sắp diễn ra hội đua thuyền rồng truyền thống trên sông Krông Ana địa phương");
            eventPool.push("🍲 Mùa lễ Vu Lan báo hiếu tháng 7 Âm lịch - Thắt đóa hoa hồng cài áo tri ân");

            const quotePool = [
                "Mùa bơ sáp Đắk Lắk chín quả vàng, ruột dẻo thơm béo ngậy đặc sản đất đỏ Tây Nguyên.",
                "Thưởng thức ly cà phê Buôn Ma Thuột đậm đặc đắng nồng giữa đại ngàn lộng gió.",
                "Mùa sầu riêng Dona Đắk Lắk thơm nức mũi, cơm dày hạt lép ngọt ngào say đắm.",
                "Mùa thu Hà Nội nồng nàn hương cốm Vòng mộc mạc xanh non gói trong lá sen.",
                "Ghé thăm Sa Pa mùa lúa chín vàng óng ả đổ tràn trên những ruộng bậc thang kì vĩ.",
                "Thưởng thức gỏi lá Kon Tum - Hội tụ tinh hoa ẩm thực của hơn 40 loại lá rừng núi.",
                "Mùa hoa dã quỳ nở rực rỡ nhuộm vàng rực khắp các cung đường đất đỏ bazan Tây Nguyên.",
                "Thưởng thức cá bống thác kho tộ đậm đà cay nồng ăn cùng cơm lam Bản Đôn dẻo thơm.",
                "Gia đình là nơi cuộc sống bắt đầu và tình yêu không bao giờ kết thúc.",
                "Nhà là nơi bão dừng sau cánh cửa, nơi bình yên ấm áp nhất để trở về.",
                "Ngắm hoàng hôn buông lững lờ lãng mạn khi trải nghiệm đi thuyền trên Hồ L Lắk thơ mộng.",
                "Bình yên đến từ bên trong tâm hồn, hãy trân trọng những điều giản đơn đang có."
            ];

            document.getElementById('countdown-text').innerHTML = eventPool[indexSeed % eventPool.length];
            document.getElementById('quote-text').innerText = `"${quotePool[indexSeed % quotePool.length]}"`;
        }

        function updateClock() {
            const now = new Date();
            const hours = now.getHours(); const minutes = now.getMinutes();
            
            let hrStr = String(hours).padStart(2, '0'); let minStr = String(minutes).padStart(2, '0');
            document.getElementById('time').innerHTML = `<span class="hours-style">${hrStr}</span><span class="minutes-style">${minStr}</span>`;

            const days = ['Chủ Nhật', 'Thứ 2', 'Thứ 3', 'Thứ 4', 'Thứ 5', 'Thứ 6', 'Thứ 7'];
            document.getElementById('date').innerText = `${days[now.getDay()]} ${now.getDate()}-${now.getMonth() + 1}`;
            document.getElementById('lunar-date').innerHTML = calculateLunarHtml(now);

            // TỰ ĐỘNG KHÓA NỀN ĐEN LÚC 21:00 VÀ MỞ LẠI LÚC 05:00 SÁNG
            if (hours >= 21 || hours < 5) document.body.classList.add('night-active');
            else document.body.classList.remove('night-active');

            applyDynamicPositions();

            if (minutes === 0 && hours !== lastChimeHour) {
                playHourlyChime(hours); lastChimeHour = hours;
            }
        }
        setInterval(updateClock, 1000);
        updateClock();

        function updateWeatherAndAQI() {
            const lat = 12.6667; const lon = 108.0500;
            fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m`)
                .then(res => res.json()).then(data => {
                    document.getElementById('weather-temp').innerText = `${Math.round(data.current.temperature_2m)}°C`;
                }).catch(() => { document.getElementById('weather-temp').innerText = '--°C'; });

            fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=us_aqi`)
                .then(res => res.json()).then(data => {
                    const aqi = data.current.us_aqi; const badge = document.getElementById('aqi-badge');
                    let label = "Tốt"; let bg = "#2ecc71"; let text = "#fff";
                    if (aqi <= 50) { label = "Tốt"; bg = "#2ecc71"; }
                    else if (aqi <= 100) { label = "Trung bình"; bg = "#f1c40f"; text = "#000"; }
                    else if (aqi <= 150) { label = "Kém"; bg = "#e67e22"; }
                    else if (aqi <= 200) { label = "Xấu"; bg = "#e74c3c"; }
                    else if (aqi <= 300) { label = "Rất xấu"; bg = "#9b59b6"; }
                    else { label = "Nguy hiểm"; bg = "#795548"; }
                    badge.innerText = `AQI: ${aqi} (${label})`; badge.style.backgroundColor = bg; badge.style.color = text;
                }).catch(() => { document.getElementById('aqi-badge').innerText = "AQI: --"; });
        }
        updateWeatherAndAQI();
        setInterval(updateWeatherAndAQI, 600000);

        function fetchImagesFromDrive() {
            const query = encodeURIComponent(`'${FOLDER_ID}' in parents and mimeType contains 'image/'`);
            fetch(`https://www.googleapis.com/drive/v3/files?q=${query}&key=${API_KEY}&fields=files(id)`)
                .then(res => { if (!res.ok) throw new Error('Err'); return res.json(); })
                .then(data => {
                    if (data.files && data.files.length > 0) {
                        images = data.files.map(file => `https://drive.google.com/uc?export=view&id=${file.id}`);
                        for (var i = images.length - 1; i > 0; i--) {
                            var j = Math.floor(Math.random() * (i + 1));
                            var temp = images[i]; images[i] = images[j]; images[j] = temp;
                        }
                        initSlideshow();
                    }
                }).catch(() => setTimeout(fetchImagesFromDrive, 5000)); 
        }

        function initSlideshow() {
            document.getElementById('slide1').src = images[0];
            changeIntervalMode(currentActiveMode);
        }

        // Đã tối ưu hóa thứ tự nạp lệnh .onload trước .src giúp trình duyệt Safari đời cũ bắt ảnh cực nhạy, không lỗi hình nền
        function changeIntervalMode(modeVal) {
            currentActiveMode = modeVal;
            const seconds = stepSeconds[modeVal];
            
            document.querySelectorAll('.speed-btn').forEach((btn, idx) => {
                if (idx + 1 === modeVal) btn.classList.add('active');
                else btn.classList.remove('active');
            });

            if (slideInterval) clearInterval(slideInterval);
            updateDynamicContentBySlide(currentIndex);

            slideInterval = setInterval(() => {
                let nextIndex = (currentIndex + 1) % images.length;
                
                let currentImg = document.getElementById(isSlide1Active ? 'slide1' : 'slide2');
                let nextImg = document.getElementById(isSlide1Active ? 'slide2' : 'slide1');

                // Sửa lỗi: Gán sự kiện onload TRƯỚC KHI nạp nguồn src để tránh lỗi cache mất ảnh trên iOS cũ
                nextImg.onload = function() {
                    currentImg.classList.remove('active');
                    nextImg.classList.add('active');
                    isSlide1Active = !isSlide1Active;
                    currentIndex = nextIndex;
                    updateDynamicContentBySlide(currentIndex);
                };
                
                nextImg.src = images[nextIndex];
            }, seconds * 1000);
        }

        fetchImagesFromDrive();
    </script>
</body>
</html>
