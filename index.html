<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="referrer" content="no-referrer">
    
    <title>Khung Ảnh Số Nghệ Thuật</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Tourney:wght@600&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            width: 100%; height: 100%; overflow: hidden;
            background-color: #ffffff; /* Khung viền ngoài màu trắng tinh khôi chuẩn Matte Gallery */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            cursor: pointer; transition: background-color 1s ease;
        }
        
        /* KHUNG TRANH TRẮNG MỸ THUẬT DẬP NỔI SÂU KHÔNG CẮT ẢNH */
        #frame-wrapper {
            position: absolute;
            top: 60px; left: 60px; right: 60px; bottom: 60px; 
            background-color: #0d0d0f; /* Lòng khung đen nhung lộng lẫy */
            overflow: hidden;
            box-shadow: 0px 15px 45px rgba(0, 0, 0, 0.15), inset 0px 0px 30px rgba(0,0,0,0.85);
            border: 1px solid #eaeaea; transition: all 0.5s ease;
        }

        #photo-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* Chế độ contain bảo toàn 100% hình ảnh gốc lơ lửng giữa khung tranh */
        .slide {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: contain !important; 
            opacity: 0; transition: opacity 4s ease-in-out; 
            -webkit-filter: drop-shadow(0px 15px 35px rgba(0,0,0,0.5));
            filter: drop-shadow(0px 15px 35px rgba(0,0,0,0.5));
        }
        .slide.active { opacity: 1; z-index: 2; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.18); z-index: 3; pointer-events: none; }

        /* GÓC TRÊN TRÁI: ĐỒNG HỒ KHỔNG LỒ */
        #info-container {
            position: absolute; top: 40px; left: 40px; z-index: 4; color: #ffffff;
            text-shadow: 0px 4px 15px rgba(0, 0, 0, 0.7);
            display: flex; flex-direction: column; align-items: center; text-align: center;
            transition: transform 0.5s ease-out, top 0.8s ease-in-out, left 0.8s ease-in-out; 
        }
        #time { font-size: 8.5rem; line-height: 0.9; display: flex; align-items: center; justify-content: center; gap: 15px; }
        .hours-style { font-family: 'Montserrat', sans-serif; font-weight: 700; color: #F4B41A; letter-spacing: -2px; transition: color 0.8s ease; }
        .minutes-style { font-family: 'Tourney', sans-serif; font-weight: 600; color: #ffffff; letter-spacing: -1px; }

        /* ĐÃ THIẾT KẾ CẢI TIẾN: KHỐI ĐÁY BÊN TRÁI BỐ CỤC TRANH TỐI GIẢN 1x2 */
        #bottom-container {
            position: absolute; bottom: 30px; left: 40px; right: 40px; z-index: 4;
            display: flex; flex-direction: row; align-items: center; justify-content: flex-start; 
            gap: 25px; text-shadow: 0px 3px 12px rgba(0, 0, 0, 0.95); transition: all 0.5s ease; 
        }
        
        /* CỘT TRÁI: Nhiệt độ khổng lồ tăng kích thước gấp đôi */
        #weather-temp { font-size: 4.8rem; font-weight: 700; color: #ffffff; line-height: 1; white-space: nowrap; }

        /* CỘT PHẢI: Khối chứa 2 hàng thông tin (Dạng 1x2 gọn gàng tinh tế) */
        #info-rows {
            display: flex; flex-direction: column; justify-content: center; gap: 8px; 
            max-width: calc(100% - 140px); text-align: left; transition: all 0.5s ease;
        }

        /* DÒNG TRÊN: Lịch Dương - Âm sạch sẽ | Số AQI tinh gọn | Ngày đếm ngược */
        #status-row { 
            display: flex; flex-direction: row; flex-wrap: wrap; align-items: center; gap: 12px; 
            font-size: 1.35rem; color: #ffffff; font-weight: 500; 
        }
        #aqi-val { font-weight: 700; transition: color 0.5s ease; } /* Chỉ tô màu đúng con số chỉ số AQI */
        .bar-separator { opacity: 0.4; font-weight: 300; }

        /* DÒNG DƯỚI: Dòng danh ngôn tự động xuống dòng mượt mà */
        #quote-row { 
            font-size: 1.35rem; font-weight: 300; font-style: italic; color: #f5f5f7; 
            white-space: normal !important; word-wrap: break-word; line-height: 1.45;
        }

        /* BẢNG PHÍM BẤM THỜI GIAN NHỎ ĐẸP TINH GIẢN */
        #control-panel {
            position: absolute; top: 20px; right: 20px; z-index: 10;
            background: rgba(0, 0, 0, 0.65); padding: 10px 14px; border-radius: 8px;
            color: #fff; font-size: 0.85rem; backdrop-filter: blur(5px);
            opacity: 0.2; transition: opacity 0.3s ease; display: flex; flex-direction: column; gap: 6px;
        }
        #control-panel.active-panel, #control-panel:hover { opacity: 1 !important; }
        .speed-btn-group { display: flex; gap: 6px; }
        .speed-btn { background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.3); color: #fff; padding: 4px 8px; font-size: 0.8rem; border-radius: 4px; cursor: pointer; font-weight: 500; transition: all 0.2s ease; }
        .speed-btn.active { background: #F4B41A !important; border-color: #F4B41A !important; color: #000 !important; font-weight: bold; }

        /* CHẾ ĐỘ BAN ĐÊM (21:00 TỐI - 05:00 SÁNG HÔM SAU) */
        .night-active { background-color: #000000 !important; } 
        .night-active #photo-container, .night-active #bottom-container { display: none !important; }
        .night-active #frame-wrapper { background-color: #000000 !important; box-shadow: none !important; border-color: transparent !important; }
        .night-active .overlay { background: rgba(0, 0, 0, 1) !important; }
        .night-active .hours-style { color: #ffffff !important; } 
        .night-active #info-container { text-shadow: none !important; }

        /* BỘ LỌC ĐA MÀN HÌNH TỰ ĐỘNG (CO GIÃN THEO THIẾT BỊ ANDROID/IPHONE) */
        @media (max-width: 900px) {
            html { font-size: 13px; } 
            #frame-wrapper { top: 35px; left: 30px; right: 30px; bottom: 35px; } 
        }
        @media (max-width: 480px) {
            html { font-size: 9.5px; } 
            #frame-wrapper { top: 15px; left: 15px; right: 15px; bottom: 15px; } 
            #info-container { top: 20px; left: 20px; } 
            #bottom-container { flex-direction: column; align-items: flex-start; bottom: 15px; left: 20px; right: 20px; gap: 8px; }
            #info-rows { max-width: 100%; }
            #status-row { justify-content: flex-start; gap: 8px; }
        }
    </style>
</head>
<body ontouchstart="activateControls()" onclick="activateControls()">

    <div id="frame-wrapper">
        <div id="photo-container">
            <img id="slide1" class="slide active" alt="" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
            <img id="slide2" class="slide" alt="" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
        </div>
        <div class="overlay"></div>

        <div id="info-container">
            <div id="time"><span class="hours-style">00</span><span class="minutes-style">00</span></div>
        </div>

        <div id="bottom-container">
            <div id="weather-temp">--°C</div>
            
            <div id="info-rows">
                <div id="status-row">
                    <span id="date-text-bottom">Thứ 0 00-00 (00-0 AL)</span>
                    <span class="bar-separator">|</span>
                    <span id="aqi-text">AQI <span id="aqi-val">--</span></span>
                    <span class="bar-separator">|</span>
                    <span id="countdown-text">Đang tính lịch sự kiện...</span>
                </div>
                <div id="quote-row">
                    <span id="quote-text">Đang tải dữ liệu đặc sản vùng miền...</span>
                </div>
            </div>
        </div>

        <div id="control-panel" onclick="event.stopPropagation();" ontouchstart="event.stopPropagation();">
            <div style="font-weight: 600; font-size: 0.75rem; color: #ccc;">Thời gian đổi ảnh:</div>
            <div class="speed-btn-group">
                <button class="speed-btn" id="speed-1" onclick="changeIntervalMode(1)">1 Phút</button>
                <button class="speed-btn" id="speed-2" onclick="changeIntervalMode(2)">3 Phút</button>
                <button class="speed-btn" id="speed-3" onclick="changeIntervalMode(3)">5 Phút</button>
                <button class="speed-btn" id="speed-4" onclick="changeIntervalMode(4)">10 Phút</button>
            </div>
        </div>
    </div>

    <script>
        var SECRET_ENCODED = 'QUl6YVN5REwyRm1VQzkxMUtBTnFwN3VPbnZKcU5xVHltb1R2SkxF';
        var API_KEY = atob(SECRET_ENCODED);
        var FOLDER_ID = '1r1WUIKwAPAnsyIh-Zot7AevEW0uEZ-Hl'; 

        var images = [];
        var currentIndex = 0;
        var slideInterval;
        var hideTimeout;
        var lastChimeHour = -1;
        var audioCtx = null; 
        var isSlide1Active = true; 

        var burnInX1 = 0, burnInY1 = 0;
        var burnInX2 = 0, burnInY2 = 0;

        var stepSeconds = { 1: 60, 2: 180, 3: 300, 4: 600 };
        var currentActiveMode = 2; 

        function activateControls() {
            if (!audioCtx) {
                try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
            }
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();

            var panel = document.getElementById('control-panel');
            panel.classList.add('active-panel');
            if (hideTimeout) clearTimeout(hideTimeout);
            hideTimeout = setTimeout(function() {
                document.getElementById('control-panel').classList.remove('active-panel');
            }, 3000);
        }

        function runAntiBurnIn() {
            burnInX1 = Math.floor(Math.random() * 24) - 12; 
            burnInY1 = Math.floor(Math.random() * 24) - 12;
            burnInX2 = Math.floor(Math.random() * 24) - 12;
            applyDynamicPositions();
        }
        setInterval(runAntiBurnIn, 60000); 

        function applyDynamicPositions() {
            var now = new Date();
            var hours = now.getHours();
            var isNightMode = (hours >= 21 || hours < 5); 

            var infoNode = document.getElementById('info-container');
            var bottomNode = document.getElementById('bottom-container');

            if (isNightMode) {
                infoNode.style.top = "50%"; infoNode.style.left = "50%";
                infoNode.style.transform = "translate(-50%, -50%) translate(" + burnInX1 + "px, " + burnInY1 + "px)";
            } else {
                infoNode.style.top = "40px"; infoNode.style.left = "40px";
                infoNode.style.transform = "translate(" + burnInX1 + "px, " + burnInY1 + "px)";
            }
            if (bottomNode) bottomNode.style.transform = "translate(" + burnInX2 + "px, " + burnInY2 + "px)";
        }

        function playHourlyChime(currentHour) {
            if (currentHour < 6 || currentHour >= 21 || !audioCtx) return;
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                var osc1 = audioCtx.createOscillator();
                var gain1 = audioCtx.createGain();
                osc1.type = 'sine'; osc1.frequency.setValueAtTime(880, audioCtx.currentTime); 
                gain1.gain.setValueAtTime(0.18, audioCtx.currentTime);
                gain1.gain.exponentialRampToValueAtTime(0.001, currentHour + 0.8);
                osc1.connect(gain1); gain1.connect(audioCtx.destination);
                osc1.start(); osc1.stop(audioCtx.currentTime + 0.8);
            } catch(e) {}
        }

        function getLunarTextString(now) {
            var phases = [
                [2025, 11, 20, 11, "Ất Tỵ"], [2026, 0, 19, 12, "Ất Tỵ"],
                [2026, 1, 17, 1, "Bính Ngọ"], [2026, 2, 19, 2, "Bính Ngọ"],
                [2026, 3, 17, 3, "Bính Ngọ"], [2026, 4, 17, 4, "Bính Ngọ"],
                [2026, 5, 15, 5, "Bính Ngọ"], [2026, 6, 14, 6, "Bính Ngọ"],
                [2026, 7, 12, 7, "Bính Ngọ"], [2026, 8, 11, 8, "Bính Ngọ"],
                [2026, 9, 11, 9, "Bính Ngọ"], [2026, 10, 9, 10, "Bính Ngọ"],
                [2026, 11, 9, 11, "Bính Ngọ"], [2027, 0, 8, 12, "Bính Ngọ"],
                [2027, 1, 6, 1, "Đinh Mùi"]
            ];
            var activePhase = phases[0];
            var checkTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0);
            for (var i = 0; i < phases.length; i++) {
                var d = new Date(phases[i][0], phases[i][1], phases[i][2], 0, 0, 0);
                if (checkTime >= d) activePhase = phases[i];
                else break;
            }
            var startDate = new Date(activePhase[0], activePhase[1], activePhase[2], 0, 0, 0);
            var diffDays = Math.floor((checkTime - startDate) / (1000 * 60 * 60 * 24)) + 1;
            return '(' + diffDays + '-' + activePhase[3] + ' AL)';
        }

        function updateDynamicContentBySlide(indexSeed) {
            var now = new Date();
            var targetTetAm = new Date(2027, 1, 6); 
            var targetNoel = new Date(2026, 11, 25);
            var targetTetDuong = new Date(2027, 0, 1);
            var targetQuocKhanh = new Date(2026, 8, 2);
            var targetPhatDan = new Date(2026, 4, 31); 
            var targetTrungThu = new Date(2026, 8, 25); 

            var daysToTetAm = Math.ceil((targetTetAm - now) / (1000 * 60 * 60 * 24));
            var daysToNoel = Math.ceil((targetNoel - now) / (1000 * 60 * 60 * 24));
            var daysToTetDuong = Math.ceil((targetTetDuong - now) / (1000 * 60 * 60 * 24));
            var daysToQuocKhanh = Math.ceil((targetQuocKhanh - now) / (1000 * 60 * 60 * 24));
            var daysToPhatDan = Math.ceil((targetPhatDan - now) / (1000 * 60 * 60 * 24));
            var daysToTrungThu = Math.ceil((targetTrungThu - now) / (1000 * 60 * 60 * 24));

            var eventPool = [];
            if (daysToTetAm > 0) eventPool.push('Còn ' + daysToTetAm + ' ngày đến Tết Nguyên Đán 2027');
            if (daysToTetDuong > 0) eventPool.push('Còn ' + daysToTetDuong + ' ngày đến Tết Dương Lịch 2027');
            if (daysToNoel > 0) eventPool.push('Còn ' + daysToNoel + ' ngày đến Giáng Sinh');
            if (daysToTrungThu > 0) eventPool.push('Còn ' + daysToTrungThu + ' ngày đến Tết Trung Thu');
            if (daysToPhatDan > 0) eventPool.push('Còn ' + daysToPhatDan + ' ngày đến Lễ Phật Đản');
            if (daysToQuocKhanh > 0) eventPool.push('Còn ' + daysToQuocKhanh + ' ngày đến Quốc Khánh 2/9');
            
            eventPool.push("Sắp đến Rằm Âm Lịch hằng tháng - Hướng về tổ tiên");
            eventPool.push("Sắp đến Mùng 1 Âm Lịch - Khởi đầu tháng mới bình an");
            eventPool.push("Thác Dray Nur Đắk Lắk mùa này nước đổ tung bọt trắng xóa");
            eventPool.push("Đón chờ Lễ hội Đua voi Bản Đôn Đắk Lắk đậm đà bản sắc");
            eventPool.push("Sắp đến kỳ lễ Phục Sinh thanh khiết trang nghiêm");

            var quotePool = [
                "Mùa bơ sáp Đắk Lắk chín quả vàng, ruột dẻo thơm béo ngậy đặc sản đất đỏ Tây Nguyên.",
                "Thưởng thức ly cà phê Buôn Ma Thuột đậm đặc đắng nồng giữa đại ngàn lộng gió.",
                "Mùa sầu riêng Dona Đắk Lắk thơm nức mũi, cơm dày hạt lép ngọt ngào say đắm.",
                "Mùa thu Hà Nội nồng nàn hương cốm Vòng mộc mạc xanh non gói trong lá sen.",
                "Ghé thăm Sa Pa mùa lúa chín vàng óng ả đổ tràn trên những ruộng bậc thang kì vĩ.",
                "Thưởng thức gỏi lá Kon Tum - Hội tụ tinh hoa ẩm thực của hơn 40 loại lá rừng núi.",
                "Mùa hoa dã quỳ nở rực rỡ nhuộm vàng rực khắp các cung đường đất đỏ bazan Tây Nguyên.",
                "Thưởng thức cá bống thác kho tộ đậm đà cay nồng ăn cùng cơm lam Bản Đôn dẻo thơm.",
                "Gia đình là nơi cuộc sống bắt đầu và tình yêu không bao giờ kết thúc.",
                "Nhà là nơi bão dừng sau cánh cửa, nơi bình yên ấm áp nhất để trở về.",
                "Ngắm hoàng hôn buông lững lờ lãng mạn khi trải nghiệm đi thuyền trên Hồ L Lắk thơ mộng."
            ];

            if(eventPool.length > 0) document.getElementById('countdown-text').innerHTML = eventPool[indexSeed % eventPool.length];
            if(quotePool.length > 0) document.getElementById('quote-text').innerText = '"' + quotePool[indexSeed % quotePool.length] + '"';
        }

        function updateClock() {
            var now = new Date();
            var hours = now.getHours(); var minutes = now.getMinutes();
            
            var hrStr = hours < 10 ? '0' + hours : hours;
            var minStr = minutes < 10 ? '0' + minutes : minutes;
            document.getElementById('time').innerHTML = '<span class="hours-style">' + hrStr + '</span><span class="minutes-style">' + minStr + '</span>';

            var days = ['Chủ Nhật', 'Thứ 2', 'Thứ 3', 'Thứ 4', 'Thứ 5', 'Thứ 6', 'Thứ 7'];
            var solarStr = days[now.getDay()] + ' ' + now.getDate() + '-' + (now.getMonth() + 1);
            var lunarStr = getLunarTextString(now);
            document.getElementById('date-text-bottom').innerText = solarStr + ' ' + lunarStr;

            if (hours >= 21 || hours < 5) document.body.classList.add('night-active');
            else document.body.classList.remove('night-active');

            applyDynamicPositions();
        }
        setInterval(updateClock, 1000);
        updateClock();

        function updateWeatherAndAQI() {
            var lat = 12.6667; var lon = 108.0500;
            
            var xhrWeather = new XMLHttpRequest();
            xhrWeather.open('GET', 'https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lon + '&current=temperature_2m', true);
            xhrWeather.onreadystatechange = function() {
                if (xhrWeather.readyState === 4 && xhrWeather.status === 200) {
                    var data = JSON.parse(xhrWeather.responseText);
                    document.getElementById('weather-temp').innerText = Math.round(data.current.temperature_2m) + '°C';
                }
            };
            xhrWeather.send();

            var xhrAQI = new XMLHttpRequest();
            xhrAQI.open('GET', 'https://air-quality-api.open-meteo.com/v1/air-quality?latitude=' + lat + '&longitude=' + lon + '&current=us_aqi', true);
            xhrAQI.onreadystatechange = function() {
                if (xhrAQI.readyState === 4 && xhrAQI.status === 200) {
                    var data = JSON.parse(xhrAQI.responseText);
                    var aqi = data.current.us_aqi; 
                    var aqiValNode = document.getElementById('aqi-val');
                    
                    var color = "#2ecc71"; 
                    if (aqi <= 50) color = "#2ecc71"; 
                    else if (aqi <= 100) color = "#f1c40f"; 
                    else if (aqi <= 150) color = "#e67e22"; 
                    else if (aqi <= 200) color = "#e74c3c"; 
                    else if (aqi <= 300) color = "#9b59b6"; 
                    else color = "#795548"; 
                    
                    if(aqiValNode) {
                        aqiValNode.innerText = aqi; 
                        aqiValNode.style.color = color;
                    }
                }
            };
            xhrAQI.send();
        }
        updateWeatherAndAQI();
        setInterval(updateWeatherAndAQI, 600000);

        function fetchImagesFromDrive() {
            var query = encodeURIComponent("'" + FOLDER_ID + "' in parents and mimeType contains 'image/'");
            var url = 'https://www.googleapis.com/drive/v3/files?q=' + query + '&key=' + API_KEY + '&fields=files(id)';
            
            var xhrDrive = new XMLHttpRequest();
            xhrDrive.open('GET', url, true);
            xhrDrive.onreadystatechange = function() {
                if (xhrDrive.readyState === 4) {
                    if (xhrDrive.status === 200) {
                        var data = JSON.parse(xhrDrive.responseText);
                        if (data.files && data.files.length > 0) {
                            images = [];
                            for (var i = 0; i < data.files.length; i++) {
                                // ĐÃ CẢI TIẾN THẦN THÁNH: Chuyển sang endpoint thumbnail siêu nhe RAM, phá bỏ lớp khóa bảo mật của Android Chrome hằng năm
                                images.push('https://drive.google.com/thumbnail?id=' + data.files[i].id + '&sz=w2048');
                            }
                            for (var k = images.length - 1; k > 0; k--) {
                                var j = Math.floor(Math.random() * (k + 1));
                                var temp = images[k]; images[k] = images[j]; images[j] = temp;
                            }
                            initSlideshow();
                        }
                    } else {
                        setTimeout(fetchImagesFromDrive, 5000); 
                    }
                }
            };
            xhrDrive.send();
        }

        function initSlideshow() {
            document.getElementById('slide1').src = images[0];
            changeIntervalMode(currentActiveMode);
        }

        function changeIntervalMode(modeVal) {
            currentActiveMode = modeVal;
            var seconds = stepSeconds[modeVal];
            
            var btns = document.querySelectorAll('.speed-btn');
            for (var i = 0; i < btns.length; i++) {
                if ((i + 1) === modeVal) btns[i].classList.add('active');
                else btns[i].classList.remove('active');
            }

            if (slideInterval) clearInterval(slideInterval);
            updateDynamicContentBySlide(currentIndex);

            slideInterval = setInterval(function() {
                var nextIndex = (currentIndex + 1) % images.length;
                var currentImg = document.getElementById(isSlide1Active ? 'slide1' : 'slide2');
                var nextImg = document.getElementById(isSlide1Active ? 'slide2' : 'slide1');

                nextImg.onload = function() {
                    currentImg.classList.remove('active');
                    nextImg.classList.add('active');
                    isSlide1Active = !isSlide1Active;
                    currentIndex = nextIndex;
                    updateDynamicContentBySlide(currentIndex);
                };
                nextImg.src = images[nextIndex];
            }, seconds * 1000);
        }

        fetchImagesFromDrive();
    </script>
</body>
</html>
