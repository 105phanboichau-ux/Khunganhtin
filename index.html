<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>Khung Ảnh Số Thông Minh</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Tourney:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        /* Ép ảnh dọc phải phóng to tràn viền ngang màn hình */
        #photo-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }
        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-size: cover !important; /* Tự động phóng to và crop vừa khít màn hình */
            background-position: center center;
            background-repeat: no-repeat;
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }
        .slide.active {
            opacity: 1;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.25);
            z-index: 2;
        }
        /* THIẾT KẾ ĐỒNG HỒ THEO PHONG CÁCH ẢNH MẪU */
        #info-container {
            position: absolute;
            bottom: 40px;
            left: 40px;
            z-index: 3;
            color: #ffffff;
            text-shadow: 0px 4px 15px rgba(0, 0, 0, 0.6);
        }
        #time {
            font-size: 7.5rem; /* Tăng kích thước chữ lớn và rõ nét */
            line-height: 0.95;
            display: flex;
            align-items: center;
            gap: 20px; /* Khoảng cách giữa Giờ và Phút không cần dấu hai chấm */
        }
        /* Kiểu chữ cho phần GIỜ (Màu vàng nắng đặc, dày) */
        .hours-style {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            color: #F4B41A; /* Chuẩn tông màu vàng nghệ thuật trong ảnh */
            letter-spacing: -2px;
        }
        /* Kiểu chữ cho phần PHÚT (Màu trắng dạng nét đôi nghệ thuật) */
        .minutes-style {
            font-family: 'Tourney', sans-serif;
            font-weight: 500; /* Độ dày vừa phải để lộ rõ rãnh đôi */
            color: #ffffff;
            letter-spacing: -1px;
        }
        #date {
            font-size: 1.6rem;
            font-weight: 400;
            margin-top: 15px;
            letter-spacing: 0.5px;
            color: #f5f5f7;
            text-shadow: 0px 2px 8px rgba(0, 0, 0, 0.8);
        }
        #weather {
            font-size: 1.4rem;
            font-weight: 300;
            margin-top: 5px;
            color: #d2d2Console;
            text-shadow: 0px 2px 8px rgba(0, 0, 0, 0.8);
        }
        /* Thanh chỉnh tốc độ ẩn thông minh */
        #control-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 4;
            background: rgba(0, 0, 0, 0.6);
            padding: 12px 18px;
            border-radius: 8px;
            color: #fff;
            font-size: 0.9rem;
            backdrop-filter: blur(5px);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s;
        }
        #control-panel.show {
            opacity: 1;
            visibility: visible;
        }
        #speedSlider {
            display: block;
            margin-top: 5px;
            width: 130px;
        }
    </style>
</head>
<body onclick="showControls()">

    <div id="photo-container"></div>
    <div class="overlay"></div>

    <div id="info-container">
        <div id="time">
            <span class="hours-style">00</span>
            <span class="minutes-style">00</span>
        </div>
        <div id="date">Thứ Hai, Ngày 01/01</div>
        <div id="weather">Đang cập nhật thời tiết...</div>
    </div>

    <div id="control-panel" onclick="event.stopPropagation();">
        <label>Đổi ảnh: <span id="speedLabel">15</span> giây</label>
        <input type="range" id="speedSlider" min="5" max="60" value="15">
    </div>

    <script>
        const KHUC_1 = 'AIzaSyDL2FmUC911KANqp7u'; 
        const KHUC_2 = 'OnvJqNqTymoTvJLE'; 
        const API_KEY = KHUC_1 + KHUC_2;
        const FOLDER_ID = '1r1WUIKwAPAnsyIh-Zot7AevEW0uEZ-Hl'; 

        let images = [];
        let currentIndex = 0;
        let slideInterval;
        let hideTimeout;

        // Cơ chế ẩn hiện thanh điều khiển thông minh
        function showControls() {
            const panel = document.getElementById('control-panel');
            panel.classList.add('show');
            if (hideTimeout) clearTimeout(hideTimeout);
            hideTimeout = setTimeout(() => {
                panel.classList.remove('show');
            }, 4000);
        }

        // Tách biệt hàm xử lý hiển thị Giờ và Phút theo phong cách mới
        function updateClock() {
            const now = new Date();
            let hours = String(now.getHours()).padStart(2, '0');
            let minutes = String(now.getMinutes()).padStart(2, '0');
            
            // Đưa định dạng font riêng biệt vào cấu trúc giao diện
            document.getElementById('time').innerHTML = `
                <span class="hours-style">${hours}</span>
                <span class="minutes-style">${minutes}</span>
            `;

            const days = ['Chủ Nhật', 'Thứ Hai', 'Thứ Ba', 'Thứ Tư', 'Thứ Năm', 'Thứ Sáu', 'Thứ Bảy'];
            document.getElementById('date').innerText = `${days[now.getDay()]}, Ngày ${now.getDate()}/${now.getMonth() + 1}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Cập nhật thời tiết Đắk Lắk
        function updateWeather() {
            const lat = 12.6667; 
            const lon = 108.0500;
            fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code`)
                .then(res => res.json())
                .then(data => {
                    const temp = Math.round(data.current.temperature_2m);
                    const code = data.current.weather_code;
                    let status = 'Trời đẹp';
                    
                    if (code === 0) status = 'Trời quang';
                    else if (code <= 3) status = 'Nhiều mây';
                    else if (code <= 48) status = 'Có sương mù';
                    else if (code <= 65) status = 'Có mưa nhẹ';
                    else if (code <= 82) status = 'Mưa rào';
                    else status = 'Có dông bão';

                    document.getElementById('weather').innerText = `🌡️ ${temp}°C  |  ☀️ ${status}`;
                })
                .catch(() => {
                    document.getElementById('weather').innerText = 'Không tải được thời tiết';
                });
        }
        updateWeather();
        setInterval(updateWeather, 600000);

        // Nạp dữ liệu ảnh tự động từ Google Drive
        function fetchImagesFromDrive() {
            const query = encodeURIComponent(`'${FOLDER_ID}' in parents and mimeType contains 'image/'`);
            const url = `https://www.googleapis.com/drive/v3/files?q=${query}&key=${API_KEY}&fields=files(id)`;
            
            fetch(url)
                .then(res => {
                    if (!res.ok) throw new Error('Kết nối thất bại');
                    return res.json();
                })
                .then(data => {
                    if (data.files && data.files.length > 0) {
                        images = data.files.map(file => `https://drive.google.com/uc?export=view&id=${file.id}`);
                        initSlideshow();
                    } else {
                        document.getElementById('photo-container').innerHTML = '<div style="color:white;padding:40px;">Thư mục Drive trống hoặc chưa bật công khai!</div>';
                    }
                })
                .catch(err => {
                    alert('Lỗi kết nối Drive: ' + err.message);
                });
        }

        // Quản lý trình chiếu ảnh nền mượt mà
        function initSlideshow() {
            const container = document.getElementById('photo-container');
            container.innerHTML = ''; 

            images.forEach((src, index) => {
                const div = document.createElement('div');
                div.classList.add('slide');
                if (index === 0) div.classList.add('active');
                div.style.backgroundImage = `url('${src}')`;
                container.appendChild(div);
            });

            const slider = document.getElementById('speedSlider');
            
            function startInterval(seconds) {
                if (slideInterval) clearInterval(slideInterval);
                slideInterval = setInterval(() => {
                    const slides = document.querySelectorAll('.slide');
                    if (slides.length <= 1) return;

                    slides[currentIndex].classList.remove('active');
                    currentIndex = (currentIndex + 1) % slides.length;
                    slides[currentIndex].classList.add('active');
                }, seconds * 1000);
            }

            slider.addEventListener('input', function() {
                document.getElementById('speedLabel').innerText = this.value;
                startInterval(parseInt(this.value));
            });

            startInterval(parseInt(slider.value));
        }

        fetchImagesFromDrive();
    </script>
</body>
</html>
