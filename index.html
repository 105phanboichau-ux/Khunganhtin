<html lang="vi">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="referrer" content="no-referrer">
    
    <title>Khung Ảnh Số Nghệ Thuật</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Tourney:wght@600&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            width: 100%; height: 100%; overflow: hidden;
            background-color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            cursor: pointer; transition: background-color 1s ease;
        }
        
        #frame-wrapper {
            position: absolute; top: 60px; left: 60px; right: 60px; bottom: 60px; 
            background-color: #000; overflow: hidden;
            box-shadow: 0px 15px 45px rgba(0, 0, 0, 0.15), inset 0px 0px 30px rgba(0,0,0,0.85);
            border: 1px solid #eaeaea; transition: all 0.5s ease;
        }

        #photo-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        .slide-group {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; transition: opacity 3s ease-in-out;
            display: flex; align-items: center; justify-content: center;
        }
        .slide-group.active { opacity: 1; z-index: 2; }
        
        .bg-img {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover !important; 
            -webkit-filter: blur(40px) brightness(0.85);
            filter: blur(40px) brightness(0.85);
            transform: scale(1.3); z-index: 1;
        }

        .fg-img {
            position: relative; z-index: 2; flex-shrink: 0;
            -webkit-filter: drop-shadow(0px 15px 35px rgba(0,0,0,0.6));
            filter: drop-shadow(0px 15px 35px rgba(0,0,0,0.6));
            transition: all 0.5s ease;
        }

        @media (orientation: landscape) { .fg-img { height: 100%; width: auto; } }
        @media (orientation: portrait) { .fg-img { width: 100%; height: auto; } }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.15); z-index: 3; pointer-events: none; }

        /* KHU VỰC 1: GÓC TRÁI TRÊN (ĐỒNG HỒ + DƯƠNG LỊCH) */
        #info-container {
            position: absolute; top: 35px; left: 35px; z-index: 4; 
            text-shadow: 0px 4px 15px rgba(0, 0, 0, 0.8);
            display: flex; flex-direction: column; align-items: center; 
            transition: all 0.8s ease-in-out; 
        }
        .hours-style { font-family: 'Montserrat', sans-serif; font-weight: 700; color: #F4B41A; font-size: 7.5rem; letter-spacing: -2px; display: block; line-height: 0.82; }
        .minutes-style { font-family: 'Tourney', sans-serif; font-weight: 600; color: #ffffff; font-size: 7.5rem; letter-spacing: -1px; display: block; margin-top: -5px; line-height: 0.82; }
        
        #date-solar-top { font-size: 1.7rem; font-weight: 700; color: #ffffff; margin-top: 14px; white-space: nowrap; }
        .highlight-yellow { color: #F4B41A; font-weight: 700; }

        /* WIDGET DANH SÁCH SỰ KIỆN GÓC PHẢI TRÊN */
        #right-event-container {
            position: absolute; top: 35px; right: 35px; z-index: 4;
            display: flex; flex-direction: column; align-items: flex-end; gap: 4px;
            max-width: 350px; text-shadow: 0px 2px 10px rgba(0,0,0,0.95);
        }
        .event-header {
            font-size: 1.1rem; color: #F4B41A; font-weight: 700; text-align: right;
            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px;
            display: flex; align-items: center; justify-content: flex-end;
        }
        .event-item {
            font-size: 1.25rem; color: rgba(255, 255, 255, 0.9); font-weight: 500; text-align: right;
            padding: 3px 10px; border-radius: 4px; border-right: 2px solid rgba(255,255,255,0.25);
            background: rgba(0, 0, 0, 0.35); margin-bottom: 2px;
        }
        .event-passed { opacity: 0.35; font-size: 1.05rem; }
        .event-urgent {
            color: #F4B41A !important; font-weight: 700; border-right-color: #F4B41A; background: rgba(0, 0, 0, 0.6);
            -webkit-animation: pulseGlow 2s infinite; animation: pulseGlow 2s infinite;
        }
        .event-today-birth { color: #2ecc71 !important; font-weight: 700; font-size: 1.35rem; border-right-color: #2ecc71; background: rgba(0, 0, 0, 0.7); }
        .event-today-death { color: #ff9500 !important; font-weight: 700; font-size: 1.35rem; border-right-color: #ff9500; background: rgba(0, 0, 0, 0.7); }
        
        @-webkit-keyframes pulseGlow { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }
        @keyframes pulseGlow { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }

        /* KHU VỰC ĐÁY MÀN HÌNH */
        #bottom-container {
            position: absolute; bottom: 30px; left: 35px; right: 35px; z-index: 4;
            display: flex; flex-direction: row; justify-content: space-between; align-items: flex-end; 
            text-shadow: 0px 3px 12px rgba(0, 0, 0, 0.95); transition: all 0.5s ease; 
        }

        /* GÓC TRÁI DƯỚI (Nhiệt độ + Danh ngôn) */
        #bottom-left {
            display: flex; flex-direction: row; align-items: center; gap: 20px; width: 60%; 
        }
        #temp-wrapper { 
            position: relative; display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; min-width: 90px; 
            border-right: 2px solid rgba(255, 255, 255, 0.25); padding-right: 20px;
        }
        #weather-val { font-size: 4.5rem; font-weight: 700; color: #ffffff; letter-spacing: -2px; line-height: 1; }
        .degree-symbol { position: absolute; top: 0px; right: -2px; font-size: 2rem; font-weight: 700; color: #ffffff; }
        #quote-row { flex: 1; font-size: 1.3rem; font-weight: 300; font-style: italic; color: #f5f5f7; line-height: 1.45; word-wrap: break-word; }

        /* GÓC PHẢI DƯỚI (Âm lịch + Sự kiện/AQI) */
        #bottom-right {
            display: flex; flex-direction: column; align-items: flex-end; text-align: right; max-width: 40%; gap: 6px;
        }
        #date-lunar-corner { font-size: 1.6rem; font-weight: 700; color: #F4B41A; letter-spacing: 0.5px; }
        #event-env-corner { font-size: 1.25rem; font-weight: 500; color: #ffffff; line-height: 1.4; opacity: 0.95; }
        .bar-separator { opacity: 0.5; font-weight: 300; margin: 0 8px; }

        /* BẢNG ĐIỀU KHIỂN & NÚT NEXT TÀNG HÌNH */
        #control-panel {
            position: absolute; top: 20px; right: 20px; z-index: 10;
            background: rgba(0, 0, 0, 0.75); padding: 12px 16px; border-radius: 8px;
            color: #fff; font-size: 0.85rem; backdrop-filter: blur(5px);
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease; 
            display: flex; flex-direction: column; gap: 10px;
        }
        #control-panel.active-panel { opacity: 1; pointer-events: auto; }
        .panel-label { font-weight: 600; font-size: 0.8rem; color: #bbb; margin-bottom: 2px; }
        .speed-btn-group { display: flex; gap: 6px; }
        .speed-btn { background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.3); color: #fff; padding: 4px 8px; font-size: 0.8rem; border-radius: 4px; cursor: pointer; font-weight: 500; transition: all 0.2s ease; }
        .speed-btn.active { background: #F4B41A !important; border-color: #F4B41A !important; color: #000 !important; font-weight: bold; }
        .action-btn-group { display: flex; gap: 8px; border-top: 1px solid rgba(255,255,255,0.15); padding-top: 8px; }
        .action-btn { flex: 1; background: rgba(244, 180, 26, 0.2); border: 1px solid #F4B41A; color: #F4B41A; padding: 5px 8px; font-size: 0.8rem; border-radius: 4px; cursor: pointer; font-weight: 600; text-align: center; }
        .action-btn:active { background: #F4B41A; color: #000; }

        #next-btn {
            position: absolute; bottom: 85px; right: 35px; z-index: 10;
            padding: 8px; display: flex; align-items: center; justify-content: center;
            opacity: 0.15; transition: opacity 0.3s; cursor: pointer;
        }
        #next-btn:active { opacity: 0.8; }
        
        /* CHẾ ĐỘ BAN ĐÊM */
        .night-active { background-color: #000000 !important; } 
        .night-active #photo-container, .night-active #bottom-container, .night-active #date-solar-top, .night-active #next-btn, .night-active #right-event-container { display: none !important; }
        .night-active #frame-wrapper { background-color: #000000 !important; box-shadow: none !important; border-color: transparent !important; }
        
        .night-active #info-container { 
            flex-direction: row !important; justify-content: center !important; 
            align-items: center !important; width: 100% !important; left: 0 !important; text-shadow: none !important;
        }
        .night-active .hours-style, .night-active .minutes-style { 
            font-size: 26vw !important; color: #ff9500 !important; margin: 0 1vw !important; letter-spacing: 0 !important; line-height: 1;
        }

        /* RESPONSIVE */
        @media (max-width: 900px) {
            html { font-size: 13px; } 
            #frame-wrapper { top: 35px; left: 30px; right: 30px; bottom: 35px; } 
            .hours-style, .minutes-style { font-size: 7rem; }
        }
        @media (max-width: 480px) {
            html { font-size: 9.5px; } 
            #frame-wrapper { top: 15px; left: 15px; right: 15px; bottom: 15px; } 
            #info-container { top: 20px; left: 15px; } 
            #bottom-container { flex-direction: column; align-items: flex-start; bottom: 15px; left: 15px; right: 15px; gap: 15px; }
            #bottom-left, #bottom-right { max-width: 100%; width: 100%; text-align: left; align-items: flex-start; }
            #next-btn { bottom: 15px; right: 15px; }
            #right-event-container { display: none !important; }
        }
    </style>
</head>

        function playNote(freq, startTime, duration, type) {
            if (!audioCtx) return;
            var osc = audioCtx.createOscillator();
            var gainNode = audioCtx.createGain();
            osc.type = type || 'sine';
            osc.frequency.setValueAtTime(freq, startTime);
            gainNode.gain.setValueAtTime(0.25, startTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
            osc.connect(gainNode); gainNode.connect(audioCtx.destination);
            osc.start(startTime); osc.stop(startTime + duration);
        }

        function playHappyBirthday() {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            var t = audioCtx.currentTime; var tempo = 0.42; 
            playNote(261.63, t, tempo*0.8); playNote(261.63, t + tempo, tempo*0.8); playNote(293.66, t + tempo*2, tempo*1.5); playNote(261.63, t + tempo*4, tempo*1.5); playNote(349.23, t + tempo*6, tempo*1.5); playNote(329.63, t + tempo*8, tempo*3);
            t += tempo * 11;
            playNote(261.63, t, tempo*0.8); playNote(261.63, t + tempo, tempo*0.8); playNote(293.66, t + tempo*2, tempo*1.5); playNote(261.63, t + tempo*4, tempo*1.5); playNote(392.00, t + tempo*6, tempo*1.5); playNote(349.23, t + tempo*8, tempo*3);
            t += tempo * 11;
            playNote(261.63, t, tempo*0.8); playNote(261.63, t + tempo, tempo*0.8); playNote(523.25, t + tempo*2, tempo*1.5); playNote(440.00, t + tempo*4, tempo*1.5); playNote(349.23, t + tempo*6, tempo*1.5); playNote(329.63, t + tempo*8, tempo*1.5); playNote(293.66, t + tempo*10, tempo*3);
            t += tempo * 13;
            playNote(466.16, t, tempo*0.8); playNote(466.16, t + tempo, tempo*0.8); playNote(440.00, t + tempo*2, tempo*1.5); playNote(349.23, t + tempo*4, tempo*1.5); playNote(392.00, t + tempo*6, tempo*1.5); playNote(349.23, t + tempo*8, tempo*4);
        }

        function playSolemnChime() {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            var t = audioCtx.currentTime;
            playNote(220.00, t, 3.5, 'sine'); playNote(440.00, t + 0.2, 3.0, 'sine'); playNote(554.37, t + 0.5, 3.0, 'sine'); playNote(659.25, t + 0.8, 3.0, 'sine'); playNote(880.00, t + 1.2, 4.0, 'sine'); 
            playNote(293.66, t + 2.5, 3.5, 'sine'); playNote(587.33, t + 2.8, 3.0, 'sine'); playNote(739.99, t + 3.1, 3.0, 'sine'); playNote(880.00, t + 3.4, 4.5, 'sine');
        }

        function forcePlayChime() {
            if (!audioUnlocked) { activateControls(); }
            setTimeout(function() { playSolemnChime(); }, 100);
        }

        function activateControls() {
            if (!audioUnlocked) {
                try { 
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)(); 
                    var osc = audioCtx.createOscillator();
                    osc.connect(audioCtx.destination); osc.start(0); osc.stop(0.001); 
                    audioUnlocked = true;
                } catch (e) {}
            }
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            var panel = document.getElementById('control-panel');
            panel.classList.add('active-panel');
            if (hideTimeout) clearTimeout(hideTimeout);
            hideTimeout = setTimeout(function() { panel.classList.remove('active-panel'); }, 4000); 
        }

        function toggleNightMode() {
            var body = document.body; var btn = document.getElementById('night-btn');
            if (body.classList.contains('night-active')) {
                forceNightMode = false; body.classList.remove('night-active'); btn.innerText = "Bật Đêm 🌙";
            } else {
                forceNightMode = true; body.classList.add('night-active'); btn.innerText = "Tắt Đêm ☀️";
            }
            applyDynamicPositions();
        }

        function runAntiBurnIn() {
            burnInX1 = Math.floor(Math.random() * 24) - 12; burnInY1 = Math.floor(Math.random() * 24) - 12;
            burnInX2 = Math.floor(Math.random() * 24) - 12; applyDynamicPositions();
        }
        setInterval(runAntiBurnIn, 60000); 

        function applyDynamicPositions() {
            var isNight = document.body.classList.contains('night-active');
            var infoNode = document.getElementById('info-container');
            var bottomNode = document.getElementById('bottom-container');

            if (isNight) {
                infoNode.style.top = "50%"; infoNode.style.left = "0"; 
                infoNode.style.transform = "translateY(-50%) translate(" + burnInX1 + "px, " + burnInY1 + "px)";
            } else {
                infoNode.style.top = "35px"; infoNode.style.left = "35px";
                infoNode.style.transform = "translate(" + burnInX1 + "px, " + burnInY1 + "px)";
            }
            if (bottomNode) bottomNode.style.transform = "translate(" + burnInX2 + "px, 0px)";

        var lotusIcon = '<svg width="24" height="24" viewBox="0 0 24 24" fill="#F4B41A" style="display:inline-block; vertical-align:-4px; margin-right:4px;"><path d="M12,22 C12,22 17,16 17,11 C17,7 12,2 12,2 C12,2 7,7 7,11 C7,16 12,22 12,22 Z" opacity="0.9"/><path d="M12,22 C12,22 21,18 22,12 C23,6 17,8 17,11 C17,16 12,22 12,22 Z" opacity="0.7"/><path d="M12,22 C12,22 3,18 2,12 C1,6 7,8 7,11 C7,16 12,22 12,22 Z" opacity="0.7"/></svg>';

        function renderRightEvents(sMonth, lMonth, sDay, lDay) {
            var html = "";
            
            var currentBirths = [];
            for (var b = 0; b < birthdays.length; b++) {
                if (birthdays[b].m === sMonth) currentBirths.push(birthdays[b]);
            }
            currentBirths.sort(function(a, b) { return a.d - b.d; });

            if (currentBirths.length > 0) {
                html += '<div class="event-header">🎂 Sinh nhật</div>';
                for (var i = 0; i < currentBirths.length; i++) {
                    var birth = currentBirths[i];
                    var diff = birth.d - sDay;
                    var cls = "event-item";
                    var txt = birth.d + "/" + birth.m + " " + birth.name;

                    if (diff < 0) { cls += " event-passed"; } 
                    else if (diff === 0) { cls += " event-today-birth"; txt += " (Hôm nay!)"; }
                    else if (diff <= 3) { cls += " event-urgent"; txt += " (Còn " + diff + " ngày)"; }

                    html += '<div class="' + cls + '">' + txt + '</div>';
                }
            }
            
            var currentDeaths = [];
            for (var a = 0; a < anniversaries.length; a++) {
                if (anniversaries[a].m === lMonth) currentDeaths.push(anniversaries[a]);
            }
            currentDeaths.sort(function(a, b) { return a.d - b.d; });

            if (currentDeaths.length > 0) {
                html += '<div class="event-header" style="margin-top: 10px;">' + lotusIcon + '</div>';
                for (var j = 0; j < currentDeaths.length; j++) {
                    var ann = currentDeaths[j];
                    var diff = ann.d - lDay;
                    var cls = "event-item";
                    
                    var shortName = ann.name.split(" (")[0];
                    var txt = ann.d + "/" + ann.m + " " + shortName;

                    if (diff < 0) { cls += " event-passed"; } 
                    else if (diff === 0) { cls += " event-today-death"; txt += " (Hôm nay!)"; }
                    else if (diff <= 3) { cls += " event-urgent"; txt += " (Còn " + diff + " ngày)"; }

                    html += '<div class="' + cls + '">' + txt + '</div>';
                }
            }
            document.getElementById('right-event-container').innerHTML = html;
        }

        function updateClock() {
            var now = new Date(); var hours = now.getHours(); var minutes = now.getMinutes(); var seconds = now.getSeconds();
            
            if (hours === 5 && minutes === 0) { forceNightMode = null; document.getElementById('night-btn').innerText = "Bật Đêm 🌙"; }

            var hrStr = hours < 10 ? '0' + hours : hours; var minStr = minutes < 10 ? '0' + minutes : minutes;
            if (document.body.classList.contains('night-active')) {
                document.getElementById('hr-node').innerText = hrStr + ":";
            } else {
                document.getElementById('hr-node').innerText = hrStr;
            }
            document.getElementById('min-node').innerText = minStr;

            if (forceNightMode === null) {
                if (hours >= 21 || hours < 5) document.body.classList.add('night-active');
                else document.body.classList.remove('night-active');
            }

            var checkTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0);
            var activePhase = phases[0];
            for (var i = 0; i < phases.length; i++) {
                var d = new Date(phases[i][0], phases[i][1], phases[i][2], 0, 0, 0);
                if (checkTime >= d) activePhase = phases[i]; else break;
            }
            var startDate = new Date(activePhase[0], activePhase[1], activePhase[2], 0, 0, 0);
            var currentLunarDay = Math.floor((checkTime - startDate) / (1000 * 60 * 60 * 24)) + 1;
            var currentLunarMonth = (activePhase[1] === 0 ? 12 : activePhase[1]);

            var shortDays = ['CN', 'Th 2', 'Th 3', 'Th 4', 'Th 5', 'Th 6', 'Th 7'];
            document.getElementById('date-solar-top').innerHTML = '<span class="highlight-yellow">' + shortDays[now.getDay()] + '</span> ' + now.getDate() + '/' + (now.getMonth() + 1);
            
            document.getElementById('date-lunar-corner').innerText = currentLunarDay + '/' + currentLunarMonth + ' Âm Lịch';

            renderRightEvents(now.getMonth() + 1, currentLunarMonth, now.getDate(), currentLunarDay);
            applyDynamicPositions();

            if (hours === 8 && minutes === 0 && seconds === 0) {
                for (var b = 0; b < birthdays.length; b++) {
                    if (birthdays[b].m === (now.getMonth() + 1) && birthdays[b].d === now.getDate()) { playHappyBirthday(); }
                }
                for (var a = 0; a < anniversaries.length; a++) {
                    if (anniversaries[a].m === currentLunarMonth && anniversaries[a].d === currentLunarDay) { playSolemnChime(); }
                }
            }
        }
        setInterval(updateClock, 1000);
        updateClock();

        function updateWeatherAndAQI() {
            // TỌA ĐỘ MỚI: XÃ EA KTUR, CƯ KUIN, ĐẮK LẮK
            var lat = 12.6283; var lon = 108.1464;
            var xhrWeather = new XMLHttpRequest();
            xhrWeather.open('GET', 'https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lon + '&current=temperature_2m,relative_humidity_2m,precipitation_probability&daily=sunrise,sunset&timezone=Asia%2FHo_Chi_Minh', true);
            xhrWeather.onerror = function() { document.getElementById('weather-val').innerText = "28"; };
            xhrWeather.onreadystatechange = function() {
                if (xhrWeather.readyState === 4 && xhrWeather.status === 200) {
                    var data = JSON.parse(xhrWeather.responseText);
                    document.getElementById('weather-val').innerText = Math.round(data.current.temperature_2m);
                    globalHum = data.current.relative_humidity_2m + '%';
                    globalRain = data.current.precipitation_probability + '%';
                    if(data.daily && data.daily.sunrise && data.daily.sunrise[0]) {
                        globalSunrise = data.daily.sunrise[0].substring(11, 16);
                        globalSunset = data.daily.sunset[0].substring(11, 16);
                    }
                }
            };
            xhrWeather.send();

            var xhrAQI = new XMLHttpRequest();
            xhrAQI.open('GET', 'https://air-quality-api.open-meteo.com/v1/air-quality?latitude=' + lat + '&longitude=' + lon + '&current=us_aqi&_t=' + new Date().getTime(), true);
            xhrAQI.onerror = function() { globalAQI = Math.floor(Math.random() * 16) + 40; };
            xhrAQI.onreadystatechange = function() {
                if (xhrAQI.readyState === 4) {
                    if (xhrAQI.status === 200) {
                        var data = JSON.parse(xhrAQI.responseText); globalAQI = data.current.us_aqi; 
                    } else { globalAQI = Math.floor(Math.random() * 16) + 40; }
                }
            };
            xhrAQI.send();
        }

        function fetchImagesFromDrive() {
            var query = encodeURIComponent("'" + FOLDER_ID + "' in parents and mimeType contains 'image/'");
            var url = 'https://www.googleapis.com/drive/v3/files?q=' + query + '&key=' + API_KEY + '&fields=files(id)';
            var xhrDrive = new XMLHttpRequest(); xhrDrive.open('GET', url, true);
            xhrDrive.onreadystatechange = function() {
                if (xhrDrive.readyState === 4) {
                    if (xhrDrive.status === 200) {
                        var data = JSON.parse(xhrDrive.responseText);
                        if (data.files && data.files.length > 0) {
                            images = [];
                            for (var i = 0; i < data.files.length; i++) {
                                images.push('https://drive.google.com/thumbnail?id=' + data.files[i].id + '&sz=w2048');
                            }
                            for (var k = images.length - 1; k > 0; k--) {
                                var j = Math.floor(Math.random() * (k + 1));
                                var temp = images[k]; images[k] = images[j]; images[j] = temp;
                            }
                            initSlideshow();
                        }
                    } else { setTimeout(fetchImagesFromDrive, 5000); }
                }
            };
            xhrDrive.send();
        }

        function initSlideshow() {
            document.getElementById('bg1').src = images[0];
            document.getElementById('fg1').src = images[0];
            changeIntervalMode(currentActiveMode);
        }

        function goToNextSlide() {
            if(images.length <= 1) return;
            var nextIndex = (currentIndex + 1) % images.length;
            var currentGroup = document.getElementById(isGroup1Active ? 'group1' : 'group2');
            var nextGroup = document.getElementById(isGroup1Active ? 'group2' : 'group1');
            var nextBg = document.getElementById(isGroup1Active ? 'bg2' : 'bg1');
            var nextFg = document.getElementById(isGroup1Active ? 'fg2' : 'fg1');

            nextFg.onload = function() {
                currentGroup.classList.remove('active'); nextGroup.classList.add('active');
                isGroup1Active = !isGroup1Active; currentIndex = nextIndex;
                updateDynamicContentBySlide();
            };
            nextBg.src = images[nextIndex]; nextFg.src = images[nextIndex];
        }

        function changeIntervalMode(modeVal) {
            currentActiveMode = modeVal; var seconds = stepSeconds[modeVal];
            var btns = document.querySelectorAll('.speed-btn');
            for (var i = 0; i < btns.length; i++) {
                if ((i + 1) === modeVal) btns[i].classList.add('active'); else btns[i].classList.remove('active');
            }
            if (slideInterval) clearInterval(slideInterval);
            slideInterval = setInterval(goToNextSlide, seconds * 1000);
        }

        function forceNextSlide(e) {
            if (e) e.stopPropagation(); goToNextSlide(); changeIntervalMode(currentActiveMode);
        }

        fetchImagesFromDrive();
