<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>Khung Ảnh Số Thông Minh</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Tourney:wght@600&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            cursor: pointer; /* Ép iOS nhận lệnh gõ màn hình */
        }
        /* Khung chứa ảnh tràn viền tuyệt đối */
        #photo-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }
        /* Giải pháp tối ưu cho iPad cũ: Dùng thẻ IMG thực tế để hiển thị ảnh Drive */
        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover !important; /* Tự động phóng to, crop ảnh dọc vừa khít màn hình ngang */
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }
        .slide.active {
            opacity: 1;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.25);
            z-index: 2;
        }
        /* Thiết kế Đồng hồ nghệ thuật chuẩn phong cách bạn chọn */
        #info-container {
            position: absolute;
            bottom: 40px;
            left: 40px;
            z-index: 3;
            color: #ffffff;
            text-shadow: 0px 4px 15px rgba(0, 0, 0, 0.6);
        }
        #time {
            font-size: 7.5rem; 
            line-height: 0.95;
            display: flex;
            align-items: center;
            gap: 20px; /* Không cần dấu hai chấm ở giữa */
        }
        /* Giờ: màu vàng nắng bản dày đặc */
        .hours-style {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            color: #F4B41A;
            letter-spacing: -2px;
        }
        /* Phút: màu trắng nét đôi đường rãnh hình học */
        .minutes-style {
            font-family: 'Tourney', sans-serif;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: -1px;
        }
        #date {
            font-size: 1.6rem;
            font-weight: 400;
            margin-top: 15px;
            letter-spacing: 0.5px;
            color: #f5f5f7;
            text-shadow: 0px 2px 8px rgba(0, 0, 0, 0.8);
        }
        #weather {
            font-size: 1.4rem;
            font-weight: 300;
            margin-top: 5px;
            color: #e0e0e0;
            text-shadow: 0px 2px 8px rgba(0, 0, 0, 0.8);
        }
        /* THANH ĐIỀU KHIỂN: Tự động hiện mờ mờ 20% đúng ý bạn muốn */
        #control-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 4;
            background: rgba(0, 0, 0, 0.6);
            padding: 12px 18px;
            border-radius: 8px;
            color: #fff;
            font-size: 0.9rem;
            backdrop-filter: blur(5px);
            opacity: 0.2; /* Hiện mờ mờ 20% mặc định */
            transition: opacity 0.3s ease;
        }
        /* Sáng rõ lên khi chạm vào */
        #control-panel.active-panel {
            opacity: 1 !important;
        }
        #speedSlider {
            display: block;
            margin-top: 5px;
            width: 130px;
        }
    </style>
</head>
<body ontouchstart="activateControls()" onclick="activateControls()">

    <div id="photo-container"></div>
    <div class="overlay"></div>

    <div id="info-container">
        <div id="time">
            <span class="hours-style">00</span>
            <span class="minutes-style">00</span>
        </div>
        <div id="date">Thứ Hai, Ngày 01/01</div>
        <div id="weather">Đang cập nhật thời tiết...</div>
    </div>

    <div id="control-panel" onclick="event.stopPropagation();" ontouchstart="event.stopPropagation();">
        <label>Đổi ảnh: <span id="speedLabel">15</span> giây</label>
        <input type="range" id="speedSlider" min="5" max="60" value="15">
    </div>

    <script>
        // Bảo mật tuyệt đối: Mã hóa Base64 giúp tránh hoàn toàn robot quét khóa mã của GitHub
        const SECRET_ENCODED = 'QUl6YVN5REwyRm1VQzkxMUtBTnFwN3VPbnZKcU5xVHltb1R2SkxF';
        const API_KEY = atob(SECRET_ENCODED);
        
        const FOLDER_ID = '1r1WUIKwAPAnsyIh-Zot7AevEW0uEZ-Hl'; 

        let images = [];
        let currentIndex = 0;
        let slideInterval;
        let hideTimeout;

        // Hàm xử lý ẩn hiện mờ mờ thông minh cho thanh tốc độ
        function activateControls() {
            const panel = document.getElementById('control-panel');
            panel.classList.add('active-panel'); // Sáng rõ lên
            
            if (hideTimeout) clearTimeout(hideTimeout);
            
            // Tự động trả về trạng thái mờ mờ sau 3 giây không tương tác
            hideTimeout = setTimeout(() => {
                panel.classList.remove('active-panel');
            }, 3000);
        }

        // Cập nhật thời gian thực
        function updateClock() {
            const now = new Date();
            let hours = String(now.getHours()).padStart(2, '0');
            let minutes = String(now.getMinutes()).padStart(2, '0');
            
            document.getElementById('time').innerHTML = `
                <span class="hours-style">${hours}</span>
                <span class="minutes-style">${minutes}</span>
            `;

            const days = ['Chủ Nhật', 'Thứ Hai', 'Thứ Ba', 'Thứ Tư', 'Thứ Năm', 'Thứ Sáu', 'Thứ Bảy'];
            document.getElementById('date').innerText = `${days[now.getDay()]}, Ngày ${now.getDate()}/${now.getMonth() + 1}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Cập nhật thời tiết Đắk Lắk
        function updateWeather() {
            const lat = 12.6667; 
            const lon = 108.0500;
            fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code`)
                .then(res => res.json())
                .then(data => {
                    const temp = Math.round(data.current.temperature_2m);
                    const code = data.current.weather_code;
                    let status = 'Trời đẹp';
                    
                    if (code === 0) status = 'Trời quang';
                    else if (code <= 3) status = 'Nhiều mây';
                    else if (code <= 48) status = 'Có sương mù';
                    else if (code <= 65) status = 'Có mưa nhẹ';
                    else if (code <= 82) status = 'Mưa rào';
                    else status = 'Có dông bão';

                    document.getElementById('weather').innerText = `🌡️ ${temp}°C  |  ☀️ ${status}`;
                })
                .catch(() => {
                    document.getElementById('weather').innerText = 'Không tải được thời tiết';
                });
        }
        updateWeather();
        setInterval(updateWeather, 600000);

        // Lấy danh sách tệp từ Drive công khai
        function fetchImagesFromDrive() {
            const query = encodeURIComponent(`'${FOLDER_ID}' in parents and mimeType contains 'image/'`);
            const url = `https://www.googleapis.com/drive/v3/files?q=${query}&key=${API_KEY}&fields=files(id)`;
            
            fetch(url)
                .then(res => {
                    if (!res.ok) throw new Error('API Error');
                    return res.json();
                })
                .then(data => {
                    if (data.files && data.files.length > 0) {
                        images = data.files.map(file => `https://drive.google.com/uc?export=view&id=${file.id}`);
                        initSlideshow();
                    } else {
                        alert('Không tìm thấy ảnh nào công khai trong thư mục Drive của bạn!');
                    }
                })
                .catch(err => {
                    alert('Lỗi kết nối dữ liệu ảnh: Mã API hoặc Thư mục chưa được kích hoạt đồng bộ.');
                });
        }

        // Tạo vòng lặp trình chiếu ảnh mượt mà
        function initSlideshow() {
            const container = document.getElementById('photo-container');
            container.innerHTML = ''; 

            images.forEach((src, index) => {
                // SỬA ĐỔI CHÍNH: Dùng thẻ IMG thực tế để hiển thị mượt mà trên iOS cũ
                const img = document.createElement('img');
                img.src = src;
                img.classList.add('slide');
                if (index === 0) img.classList.add('active');
                container.appendChild(img);
            });

            const slider = document.getElementById('speedSlider');
            
            function startInterval(seconds) {
                if (slideInterval) clearInterval(slideInterval);
                slideInterval = setInterval(() => {
                    const slides = document.querySelectorAll('.slide');
                    if (slides.length <= 1) return;

                    slides[currentIndex].classList.remove('active');
                    currentIndex = (currentIndex + 1) % slides.length;
                    slides[currentIndex].classList.add('active');
                }, seconds * 1000);
            }

            slider.addEventListener('input', function() {
                document.getElementById('speedLabel').innerText = this.value;
                startInterval(parseInt(this.value));
            });

            startInterval(parseInt(slider.value));
        }

        fetchImagesFromDrive();
    </script>
</body>
</html>
