<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Khung Ảnh Số & Đồng Hồ</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        /* Phần nền hiển thị ảnh tràn viền */
        #photo-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 2s ease-in-out; /* Hiệu ứng chuyển cảnh mượt 2 giây */
        }
        .slide.active {
            opacity: 1;
        }
        /* Lớp phủ làm tối ảnh nhẹ để nổi bật chữ đồng hồ */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.25);
            z-index: 2;
        }
        /* Thiết kế đồng hồ phong cách Apple */
        #clock-container {
            position: absolute;
            bottom: 40px;
            left: 40px;
            z-index: 3;
            color: #ffffff;
            text-shadow: 0px 4px 10px rgba(0, 0, 0, 0.8);
        }
        #time {
            font-size: 5.5rem;
            font-weight: 300;
            line-height: 1;
        }
        #date {
            font-size: 1.8rem;
            font-weight: 400;
            margin-top: 5px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="photo-container"></div>
    <div class="overlay"></div>

    <div id="clock-container">
        <div id="time">00:00</div>
        <div id="date">Thứ Hai, 01 Tháng 01</div>
    </div>

    <script>
        // === MÃ CỦA BẠN ĐÃ ĐƯỢC CẤU HÌNH AN TOÀN ===
        const KEY_PART1 = 'AIzaSyDL2Fm'; 
        const KEY_PART2 = 'UC911KANqp7uOnvJqNqTymoTvJLE'; 
        const FOLDER_ID = '1r1WUIKwAPAnsyIh-Zot7AevEW0uEZ-Hl'; 
        const CHANGE_INTERVAL = 15000; // 15 giây đổi ảnh một lần

        // Tự động nối mã lại khi ứng dụng khởi chạy trên iPad
        const API_KEY = KEY_PART1 + KEY_PART2;

        let images = [];
        let currentIndex = 0;

        // Hàm cập nhật đồng hồ thời gian thực
        function updateClock() {
            const now = new Date();
            let hours = String(now.getHours()).padStart(2, '0');
            let minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('time').innerText = `${hours}:${minutes}`;

            const days = ['Chủ Nhật', 'Thứ Hai', 'Thứ Ba', 'Thứ Tư', 'Thứ Năm', 'Thứ Sáu', 'Thứ Bảy'];
            let dayName = days[now.getDay()];
            let day = now.getDate();
            let month = now.getMonth() + 1;
            document.getElementById('date').innerText = `${dayName}, Ngày ${day}/${month}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Hàm gọi dữ liệu ảnh từ Google Drive công khai
        async function fetchImagesFromDrive() {
            const query = encodeURIComponent(`'${FOLDER_ID}' in parents and mimeType contains 'image/'`);
            const url = `https://www.googleapis.com/drive/v3/files?q=${query}&key=${API_KEY}&fields=files(id)`;
            
            try {
                const response = await fetch(url);
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error.message || 'Yêu cầu API thất bại');
                }
                const data = await response.json();
                
                if (data.files && data.files.length > 0) {
                    images = data.files.map(file => `https://drive.google.com/uc?export=view&id=${file.id}`);
                    initSlideshow();
                } else {
                    alert('Không tìm thấy ảnh nào. Hãy chắc chắn trong thư mục Drive đã có ảnh chụp nhé!');
                }
            } catch (error) {
                console.error(error);
                alert('Lỗi từ hệ thống: ' + error.message);
            }
        }

        // Hàm chạy trình chiếu ảnh nền
        function initSlideshow() {
            const container = document.getElementById('photo-container');
            container.innerHTML = ''; 

            images.forEach((src, index) => {
                const div = document.createElement('div');
                div.classList.add('slide');
                if (index === 0) div.classList.add('active');
                div.style.backgroundImage = `url('${src}')`;
                container.appendChild(div);
            });

            setInterval(() => {
                const slides = document.querySelectorAll('.slide');
                if (slides.length <= 1) return;

                slides[currentIndex].classList.remove('active');
                currentIndex = (currentIndex + 1) % slides.length;
                slides[currentIndex].classList.add('active');
            }, CHANGE_INTERVAL);
        }

        fetchImagesFromDrive();
    </script>
</body>
</html>
