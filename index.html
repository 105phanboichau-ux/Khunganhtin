    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; cursor: pointer; transition: background-color 1s ease; }
        #frame-wrapper { position: absolute; top: 60px; left: 60px; right: 60px; bottom: 60px; background-color: #000; overflow: hidden; box-shadow: 0px 15px 45px rgba(0, 0, 0, 0.15), inset 0px 0px 30px rgba(0,0,0,0.85); border: 1px solid #eaeaea; transition: all 0.5s ease; }
        #photo-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .slide-group { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; transition: opacity 3s ease-in-out; display: flex; align-items: center; justify-content: center; }
        .slide-group.active { opacity: 1; z-index: 2; }
        
        /* 🛡️ CƠ CHẾ HIỂN THỊ ẢNH HOÀN HẢO (NO-CROP, SMART-FILL) */
        
        /* NỀN MỜ PHÍA SAU, LẤP ĐẦY MÀN HÌNH */
        .background-blur { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover !important; -webkit-filter: blur(40px) brightness(0.85); filter: blur(40px) brightness(0.85); transform: scale(1.3); z-index: 1; display: none; /* Mặc định ẩn */ }
        
        /* ẢNH CHÍNH PHÍA TRƯỚC */
        .foreground-image { 
            position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%; 
            /* object-fit: cover; Sẽ được JS cập nhật động */
            z-index: 2; flex-shrink: 0; 
            -webkit-filter: drop-shadow(0px 15px 35px rgba(0,0,0,0.6)); 
            filter: drop-shadow(0px 15px 35px rgba(0,0,0,0.6)); transition: all 0.5s ease; 
        }

        /* LỚP NỀN MỜ SẼ HIỂN THỊ KHI CÓ LỚP CSS THÍCH HỢP CHO ẢNH CHÍNH */
        .slide-group.show-blur .background-blur { display: block; }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.15); z-index: 3; pointer-events: none; }

        /* VỊ TRÍ GÓC MÀN HÌNH */
        #info-container { position: absolute; top: 35px; left: 35px; z-index: 4; text-shadow: 0px 4px 15px rgba(0, 0, 0, 0.8); display: flex; flex-direction: column; align-items: center; transition: all 0.8s ease-in-out; }
        .hours-style { font-family: 'Montserrat', sans-serif; font-weight: 700; color: #F4B41A; font-size: 7.5rem; letter-spacing: -2px; display: block; line-height: 0.82; }
        .minutes-style { font-family: 'Tourney', sans-serif; font-weight: 600; color: #ffffff; font-size: 7.5rem; letter-spacing: -1px; display: block; margin-top: -5px; line-height: 0.82; }
        #date-solar-top { font-size: 1.7rem; font-weight: 700; color: #ffffff; margin-top: 14px; white-space: nowrap; }
        .highlight-yellow { color: #F4B41A; font-weight: 700; }

        #right-event-container { position: absolute; top: 35px; right: 35px; z-index: 4; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; max-width: 350px; text-shadow: 0px 2px 10px rgba(0,0,0,0.95); }
        .event-header { font-size: 1.1rem; color: #F4B41A; font-weight: 700; text-align: right; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; display: flex; align-items: center; justify-content: flex-end; }
        /* 🆕 XÓA BỎ GẠCH ĐỨNG (BORDER-RIGHT) */
        .event-item { font-size: 1.25rem; color: rgba(255, 255, 255, 0.9); font-weight: 500; text-align: right; padding: 3px 10px; border-radius: 4px; /* border-right: 2px solid rgba(255,255,255,0.25); */ background: rgba(0, 0, 0, 0.35); margin-bottom: 2px; }
        .event-passed { opacity: 0.35; font-size: 1.05rem; }
        .event-urgent { color: #F4B41A !important; font-weight: 700; border-right-color: #F4B41A; background: rgba(0, 0, 0, 0.6); -webkit-animation: pulseGlow 2s infinite; animation: pulseGlow 2s infinite; }
        .event-today-birth { color: #2ecc71 !important; font-weight: 700; font-size: 1.35rem; border-right-color: #2ecc71; background: rgba(0, 0, 0, 0.7); }
        .event-today-death { color: #ff9500 !important; font-weight: 700; font-size: 1.35rem; border-right-color: #ff9500; background: rgba(0, 0, 0, 0.7); }
        @-webkit-keyframes pulseGlow { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }
        @keyframes pulseGlow { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }

        #bottom-container { position: absolute; bottom: 30px; left: 35px; right: 35px; z-index: 4; display: flex; flex-direction: row; justify-content: space-between; align-items: flex-end; text-shadow: 0px 3px 12px rgba(0, 0, 0, 0.95); transition: all 0.5s ease; }
        #bottom-left { display: flex; flex-direction: row; align-items: center; gap: 20px; width: 60%; }
        /* 🆕 XÓA BỎ GẠCH ĐỨNG (BORDER-RIGHT) */
        #temp-wrapper { position: relative; display: flex; align-items: center; justify-content: center; flex-shrink: 0; min-width: 90px; /* border-right: 2px solid rgba(255, 255, 255, 0.25); */ padding-right: 20px; }
        #weather-val { font-size: 4.5rem; font-weight: 700; color: #ffffff; letter-spacing: -2px; line-height: 1; }
        .degree-symbol { position: absolute; top: 0px; right: -2px; font-size: 2rem; font-weight: 700; color: #ffffff; }
        #quote-row { flex: 1; font-size: 1.3rem; font-weight: 300; font-style: italic; color: #f5f5f7; line-height: 1.45; word-wrap: break-word; }
        #bottom-right { display: flex; flex-direction: column; align-items: flex-end; text-align: right; max-width: 40%; gap: 6px; }
        #date-lunar-corner { font-size: 1.6rem; font-weight: 700; color: #F4B41A; letter-spacing: 0.5px; }
        #event-env-corner { font-size: 1.25rem; font-weight: 500; color: #ffffff; line-height: 1.4; opacity: 0.95; }
        /* 🆕 XÓA BỎ GẠCH PHÂN CÁCH (BAR-SEPARATOR) */
        /* .bar-separator { opacity: 0.5; font-weight: 300; margin: 0 8px; } */

        /* 🛡️ BẢNG ĐIỀU KHIỂN ĐÃ ĐƯỢC TỐI ƯU HÓA ĐỘ NHẠY VÀ VỊ TRÍ NÚT CHUYỂN ẢNH */
        #control-panel { position: absolute; top: 20px; right: 20px; z-index: 10; background: rgba(0, 0, 0, 0.75); padding: 16px; border-radius: 8px; color: #fff; font-size: 0.85rem; backdrop-filter: blur(5px); opacity: 0; pointer-events: none; transition: opacity 0.3s ease; display: flex; flex-direction: column; gap: 12px; }
        #control-panel.active-panel { opacity: 1; pointer-events: auto; }
        .panel-label { font-weight: 600; font-size: 0.9rem; color: #bbb; margin-bottom: 2px; }
        /* 🆕 TĂNG KÍCH THƯỚC NÚT ĐỂ TĂNG ĐỘ NHẠY */
        .speed-btn-group { display: flex; gap: 8px; }
        .speed-btn, #speed-next { background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.3); color: #fff; padding: 10px 16px; font-size: 0.9rem; border-radius: 6px; cursor: pointer; font-weight: 500; transition: all 0.2s ease; outline: none; }
        .speed-btn.active { background: #F4B41A !important; border-color: #F4B41A !important; color: #000 !important; font-weight: bold; }
        /* 🆕 NÚT CHUYỂN ẢNH MỚI BÊN CẠNH NÚT 10 P */
        #speed-next { background: rgba(244, 180, 26, 0.2); border-color: #F4B41A; color: #F4B41A; }
        #speed-next:active { background: #F4B41A; color: #000; }

        .action-btn-group { display: flex; gap: 10px; border-top: 1px solid rgba(255,255,255,0.15); padding-top: 10px; }
        .action-btn { flex: 1; background: rgba(244, 180, 26, 0.2); border: 1px solid #F4B41A; color: #F4B41A; padding: 10px 16px; font-size: 0.9rem; border-radius: 6px; cursor: pointer; font-weight: 600; text-align: center; outline: none; }
        .action-btn:active { background: #F4B41A; color: #000; }

        /* 🆕 GIẢM KÍCH THƯỚC ĐỒNG HỒ BAN ĐÊM ĐỂ HIỂN THỊ ĐẦY ĐỦ 20vw VÀ ĐIỀU CHỈNH TRỤC */
        .night-active { background-color: #000000 !important; } 
        .night-active #photo-container, .night-active #bottom-container, .night-active #date-solar-top, .night-active #next-btn, .night-active #right-event-container { display: none !important; }
        .night-active #frame-wrapper { background-color: #000000 !important; box-shadow: none !important; border-color: transparent !important; }
        .night-active #info-container { flex-direction: row !important; justify-content: center !important; align-items: center !important; width: 100% !important; left: 0 !important; text-shadow: none !important; top: 50% !important; transform: translateY(-50%) !important; }
        .night-active .hours-style, .night-active .minutes-style { font-size: 20vw !important; color: #ff9500 !important; margin: 0 0.5vw !important; letter-spacing: -0.5vw !important; line-height: 1; }

        /* RESPONSIVE */
        @media (max-width: 900px) {
            html { font-size: 13px; } 
            #frame-wrapper { top: 35px; left: 30px; right: 30px; bottom: 35px; } 
            .hours-style, .minutes-style { font-size: 7rem; }
        }
        @media (max-width: 480px) {
            html { font-size: 9.5px; } 
            #frame-wrapper { top: 15px; left: 15px; right: 15px; bottom: 15px; } 
            #info-container { top: 20px; left: 15px; } 
            #bottom-container { flex-direction: column; align-items: flex-start; bottom: 15px; left: 15px; right: 15px; gap: 15px; }
            #bottom-left, #bottom-right { max-width: 100%; width: 100%; text-align: left; align-items: flex-start; }
            #right-event-container { display: none !important; }
        }
    </style>
</head>

            if (currentDeaths.length > 0) {
                html += '<div class="event-header" style="margin-top: 10px;">' + lotusIcon + '</div>';
                for (var j = 0; j < currentDeaths.length; j++) {
                    var ann = currentDeaths[j]; var diff = ann.d - lDay; var cls = "event-item";
                    var shortName = ann.name.split(" (")[0]; var txt = ann.d + "/" + ann.m + " " + shortName;
                    if (diff < 0) { cls += " event-passed"; } else if (diff === 0) { cls += " event-today-death"; txt += " (Hôm nay!)"; } else if (diff <= 3) { cls += " event-urgent"; txt += " (Còn " + diff + " ngày)"; }
                    html += '<div class="' + cls + '">' + txt + '</div>';
                }
            }
            document.getElementById('right-event-container').innerHTML = html;
        }

        function fetchEventsFromDrive() {
            var query = encodeURIComponent("'" + FOLDER_ID + "' in parents and name = 'sukien.txt' and trashed = false");
            var url = 'https://www.googleapis.com/drive/v3/files?q=' + query + '&key=' + API_KEY + '&fields=files(id)';
            var xhr = new XMLHttpRequest(); xhr.open('GET', url, true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    var data = JSON.parse(xhr.responseText);
                    if (data.files && data.files.length > 0) { downloadEventFile(data.files[0].id); }
                }
            };
            xhr.send();
        }

        function downloadEventFile(fileId) {
            var url = 'https://www.googleapis.com/drive/v3/files/' + fileId + '?alt=media&key=' + API_KEY;
            var xhr = new XMLHttpRequest(); xhr.open('GET', url, true);
            if (xhr.overrideMimeType) xhr.overrideMimeType('text/plain; charset=utf-8');
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) { parseEventsText(xhr.responseText); }
            };
            xhr.send();
        }

        function parseEventsText(text) {
            var lines = text.split('\n'); var mode = 0; var tempB = []; var tempA = [];
            for (var i = 0; i < lines.length; i++) {
                var line = lines[i].replace('\r', '').trim(); if (!line) continue;
                var upper = line.toUpperCase();
                if (upper.indexOf('[SINH NH') !== -1 || upper.indexOf('SINH NHẬT') !== -1) { mode = 1; continue; }
                if (upper.indexOf('[NGAY GI') !== -1 || upper.indexOf('NGÀY GIỖ') !== -1) { mode = 2; continue; }
                
                var match = line.match(/^(\d{1,2})\s*\/\s*(\d{1,2})\s*[-:]?\s*(.+)$/);
                if (match) {
                    var d = parseInt(match[1], 10); var m = parseInt(match[2], 10); var nameStr = match[3].trim();
                    if (mode === 1) tempB.push({d: d, m: m, name: nameStr});
                    if (mode === 2) tempA.push({d: d, m: m, name: nameStr});
                }
            }
            if (tempB.length > 0) birthdays = tempB;
            if (tempA.length > 0) anniversaries = tempA;
            updateClock(); 
        }

        function updateClock() {
            var now = new Date(); var hours = now.getHours(); var minutes = now.getMinutes(); var seconds = now.getSeconds();
            if (hours === 5 && minutes === 0) { forceNightMode = null; document.getElementById('night-btn').innerText = "Bật Đêm 🌙"; }
            if (hours === 5 && minutes === 0 && seconds === 0) { syncDriveData(); }

            var hrStr = hours < 10 ? '0' + hours : hours; var minStr = minutes < 10 ? '0' + minutes : minutes;
            if (document.body.classList.contains('night-active')) { document.getElementById('hr-node').innerText = hrStr + ":"; } 
            else { document.getElementById('hr-node').innerText = hrStr; }
            document.getElementById('min-node').innerText = minStr;

            if (forceNightMode === null) {
                if (hours >= 21 || hours < 5) document.body.classList.add('night-active'); else document.body.classList.remove('night-active');
            }

            var checkTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0); var activePhase = phases[0];
            for (var i = 0; i < phases.length; i++) { var d = new Date(phases[i][0], phases[i][1], phases[i][2], 0, 0, 0); if (checkTime >= d) activePhase = phases[i]; else break; }
            var startDate = new Date(activePhase[0], activePhase[1], activePhase[2], 0, 0, 0);
            var currentLunarDay = Math.floor((checkTime - startDate) / (1000 * 60 * 60 * 24)) + 1;
            var currentLunarMonth = (activePhase[1] === 0 ? 12 : activePhase[1]);

            var shortDays = ['CN', 'Th 2', 'Th 3', 'Th 4', 'Th 5', 'Th 6', 'Th 7'];
            document.getElementById('date-solar-top').innerHTML = '<span class="highlight-yellow">' + shortDays[now.getDay()] + '</span> ' + now.getDate() + '/' + (now.getMonth() + 1);
            document.getElementById('date-lunar-corner').innerText = currentLunarDay + '/' + currentLunarMonth + ' Âm Lịch';

            renderRightEvents(now.getMonth() + 1, currentLunarMonth, now.getDate(), currentLunarDay);
            applyDynamicPositions();

            if (hours === 8 && minutes === 0 && seconds === 0) {
                for (var b = 0; b < birthdays.length; b++) { if (birthdays[b].m === (now.getMonth() + 1) && birthdays[b].d === now.getDate()) { playHappyBirthday(); } }
                for (var a = 0; a < anniversaries.length; a++) { if (anniversaries[a].m === currentLunarMonth && anniversaries[a].d === currentLunarDay) { playSolemnChime(); } }
            }
        }
        setInterval(updateClock, 1000); updateClock();

        function updateWeatherAndAQI() {
            var lat = 12.6283; var lon = 108.1464;
            var xhrWeather = new XMLHttpRequest();
            xhrWeather.open('GET', 'https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lon + '&current=temperature_2m,relative_humidity_2m,precipitation_probability&daily=sunrise,sunset&timezone=Asia%2FHo_Chi_Minh', true);
            xhrWeather.onerror = function() { document.getElementById('weather-val').innerText = "28"; };
            xhrWeather.onreadystatechange = function() {
                if (xhrWeather.readyState === 4 && xhrWeather.status === 200) {
                    var data = JSON.parse(xhrWeather.responseText); document.getElementById('weather-val').innerText = Math.round(data.current.temperature_2m);
                    globalHum = data.current.relative_humidity_2m + '%'; globalRain = data.current.precipitation_probability + '%';
                    if(data.daily && data.daily.sunrise && data.daily.sunrise[0]) { globalSunrise = data.daily.sunrise[0].substring(11, 16); globalSunset = data.daily.sunset[0].substring(11, 16); }
                }
            };
            xhrWeather.send();

            var xhrAQI = new XMLHttpRequest();
            xhrAQI.open('GET', 'https://air-quality-api.open-meteo.com/v1/air-quality?latitude=' + lat + '&longitude=' + lon + '&current=us_aqi&_t=' + new Date().getTime(), true);
            xhrAQI.onerror = function() { globalAQI = Math.floor(Math.random() * 16) + 40; };
            xhrAQI.onreadystatechange = function() {
                if (xhrAQI.readyState === 4) {
                    if (xhrAQI.status === 200) { var data = JSON.parse(xhrAQI.responseText); globalAQI = data.current.us_aqi; } 
                    else { globalAQI = Math.floor(Math.random() * 16) + 40; }
                }
            };
            xhrAQI.send();
        }

        // 🌟 THUẬT TOÁN "XÚC XẮC THÔNG MINH" CẬP NHẬT: ƯU TIÊN HIỂN THỊ LỄ HỘI SẮP ĐẾN TRONG 7 NGÀY
        function updateDynamicContentBySlide() {
            var now = new Date();
            var currentSolarMonth = now.getMonth() + 1;
            var sDay = now.getDate();
            
            // Tính tháng Âm lịch hiện tại
            var checkTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0); var activePhase = phases[0];
            for (var i = 0; i < phases.length; i++) { var d = new Date(phases[i][0], phases[i][1], phases[i][2], 0, 0, 0); if (checkTime >= d) activePhase = phases[i]; else break; }
            var currentLunarMonth = (activePhase[1] === 0 ? 12 : activePhase[1]);
            var lDay = Math.floor((checkTime - new Date(activePhase[0], activePhase[1], activePhase[2], 0, 0, 0)) / (1000 * 60 * 60 * 24)) + 1;

            // Cập nhật Cột Môi trường
            var envPool = ['AQI Ea Ktur: <span class="highlight-yellow">' + globalAQI + '</span>', 'Độ ẩm: <span class="highlight-yellow">' + globalHum + '</span>', 'Tỷ lệ mưa: <span class="highlight-yellow">' + globalRain + '</span>', 'Bình minh: <span class="highlight-yellow">' + globalSunrise + '</span>', 'Hoàng hôn: <span class="highlight-yellow">' + globalSunset + '</span>'];
            var currentEnv = envPool[envDisplayIndex % envPool.length]; envDisplayIndex++; 

            // Cập nhật Sự kiện đếm ngược
            var targetTetAm = new Date(2027, 1, 6); var targetTetDuong = new Date(2027, 0, 1); var targetNoel = new Date(2026, 11, 25); var targetTrungThu = new Date(2026, 8, 25); var targetPhatDan = new Date(2026, 4, 31); var targetQuocKhanh = new Date(2026, 8, 2);
            var eventPool = [];
            var daysToTetAm = Math.floor((targetTetAm - now) / 86400000); if (daysToTetAm > 0) eventPool.push('Còn ' + daysToTetAm + ' ngày đến Tết Nguyên Đán');
            var daysToTetDuong = Math.floor((targetTetDuong - now) / 86400000); if (daysToTetDuong > 0) eventPool.push('Còn ' + daysToTetDuong + ' ngày đến Tết Dương Lịch');
            var daysToNoel = Math.floor((targetNoel - now) / 86400000); if (daysToNoel > 0) eventPool.push('Còn ' + daysToNoel + ' ngày đến Giáng Sinh');
            var daysToTrungThu = Math.floor((targetTrungThu - now) / 86400000); if (daysToTrungThu > 0) eventPool.push('Còn ' + daysToTrungThu + ' ngày đến Tết Trung Thu');
            var daysToPhatDan = Math.floor((targetPhatDan - now) / 86400000); if (daysToPhatDan > 0) eventPool.push('Còn ' + daysToPhatDan + ' ngày đến Lễ Phật Đản');
            var daysToQuocKhanh = Math.floor((targetQuocKhanh - now) / 86400000); if (daysToQuocKhanh > 0) eventPool.push('Còn ' + daysToQuocKhanh + ' ngày đến Quốc Khánh 2/9 🇻🇳');
            eventPool.push("Sắp đến Rằm Âm Lịch"); eventPool.push("Sắp đến Mùng 1 Âm Lịch");

            var randomEvent = eventPool[Math.floor(Math.random() * eventPool.length)];
            // 🆕 XÓA BỎ GẠCH PHÂN CÁCH (BAR-SEPARATOR)
            document.getElementById('event-env-corner').innerHTML = randomEvent + '  ' + currentEnv; 
            
            // 🎲 THUẬT TOÁN TUNG XÚC XẮC CHỌN DANH NGÔN / ĐẶC SẢN / LỄ HỘI SẮP ĐẾN
            var activeSpecialties = [];
            for(var s=0; s<specialtiesData.length; s++) {
                if(specialtiesData[s].m === currentSolarMonth || specialtiesData[s].m === 0) activeSpecialties.push(specialtiesData[s].text);
            }
            
            var activeFestivals Soon = [];
            for(var f=0; f<festivalsData.length; f++) {
                var fest = festivalsData[f];
                if(fest.type === 's') {
                    // Lễ hội Dương lịch
                    // Tính số ngày chênh lệch
                    // Để đơn giản và chính xác online, chỉ kiểm tra trong cùng tháng
                    if(fest.m === currentSolarMonth && sDay <= fest.d && sDay >= fest.d - 7) {
                        activeFestivals Soon.push("Sắp đến Lễ hội: " + fest.text + " (ngày " + fest.d + "/" + fest.m + ")");
                    }
                } else if(fest.type === 'l') {
                    // Lễ hội Âm lịch
                    // Giả định ngày AL, so sánh đơn giản
                    if(fest.m === currentLunarMonth && lDay <= fest.d && lDay >= fest.d - 7) {
                        activeFestivals Soon.push("Sắp đến Lễ hội: " + fest.text + " (ngày " + getLunarDateStringRaw(fest.d, fest.m) + ")");
                    }
                }
            }

            var finalQuote = "";
            var dice = Math.random(); // Ngẫu nhiên từ 0 đến 1
            
            // 🆕 ƯU TIÊN LỄ HỘI SẮP ĐẾN TRONG 7 NGÀY (Cơ hội 40%)
            if (dice < 0.4 && activeFestivals Soon.push.length > 0) {
                finalQuote = "🏮 " + activeFestivals Soon.push[Math.floor(Math.random() * activeFestivals Soon.push.length)];
            } 
            // 30% cơ hội hiển thị Đặc sản mùa này (nếu có)
            else if (dice >= 0.4 && dice < 0.7 && activeSpecialties.length > 0) {
                finalQuote = "🌾 Đặc sản mùa này: " + activeSpecialties[Math.floor(Math.random() * activeSpecialties.length)];
            } 
            // 30% còn lại hiển thị Danh ngôn cuộc sống
            else {
                finalQuote = quotePool[Math.floor(Math.random() * quotePool.length)];
            }

            document.getElementById('quote-row').innerText = '"' + finalQuote + '"';
        }

        function getLunarDateStringRaw(d, m) {
            // Hàm đơn giản để tạo chuỗi ngày Âm lịch thô
            return d + "/" + m + " Âm lịch";
        }

        updateDynamicContentBySlide(); updateWeatherAndAQI(); setInterval(updateWeatherAndAQI, 600000);

        function syncDriveData() {
            fetchEventsFromDrive(); 
            var query = encodeURIComponent("'" + FOLDER_ID + "' in parents and mimeType contains 'image/'");
            var url = 'https://www.googleapis.com/drive/v3/files?q=' + query + '&key=' + API_KEY + '&fields=files(id)';
            var xhrDrive = new XMLHttpRequest(); xhrDrive.open('GET', url, true);
            xhrDrive.onreadystatechange = function() {
                if (xhrDrive.readyState === 4) {
                    if (xhrDrive.status === 200) {
                        var data = JSON.parse(xhrDrive.responseText);
                        if (data.files && data.files.length > 0) {
                            images = [];
                            for (var i = 0; i < data.files.length; i++) { images.push('https://drive.google.com/thumbnail?id=' + data.files[i].id + '&sz=w2048'); }
                            for (var k = images.length - 1; k > 0; k--) { var j = Math.floor(Math.random() * (k + 1)); var temp = images[k]; images[k] = images[j]; images[j] = temp; }
                            initSlideshow();
                        }
                    } else { setTimeout(syncDriveData, 5000); }
                }
            };
            xhrDrive.send();
        }

        function initSlideshow() { 
            loadAndDisplayImage(images[0], isGroup1Active ? 'group1' : 'group2', isGroup1Active ? 'bg1' : 'bg2', isGroup1Active ? 'fg1' : 'fg2');
            changeIntervalMode(currentActiveMode); 
        }
        
        function goToNextSlide() {
            if(images.length <= 1) return; var nextIndex = (currentIndex + 1) % images.length;
            loadAndDisplayImage(images[nextIndex], isGroup1Active ? 'group2' : 'group1', isGroup1Active ? 'bg2' : 'bg1', isGroup1Active ? 'fg2' : 'fg1');
        }

        // 🛡️ CƠ CHẾ TẢI VÀ HIỂN THỊ ẢNH THÔNG MINH (XỬ LÝ HƯỚNG ẢNH KHI TẢI)
        function loadAndDisplayImage(imgUrl, groupID, bgID, fgID) {
            var currentGroup = document.getElementById(isGroup1Active ? 'group1' : 'group2');
            var nextGroup = document.getElementById(groupID);
            var nextBg = document.getElementById(bgID);
            var nextFg = document.getElementById(fgID);

            nextFg.onload = function() {
                // TỰ ĐỘNG CẬP NHẬT CƠ CHẾ HIỂN THỊ DỰA TRÊN HƯỚNG ẢNH VÀ MÀN HÌNH
                updateImageDisplayMechanism(nextFg, nextGroup);
                
                currentGroup.classList.remove('active');
                nextGroup.classList.add('active');
                
                isGroup1Active = !isGroup1Active;
                currentIndex = (currentIndex + 1) % images.length;
                updateDynamicContentBySlide();
            };
            
            nextBg.src = imgUrl;
            nextFg.src = imgUrl;
        }

        function updateImageDisplayMechanism(imgElement, groupElement) {
            // Lấy hướng màn hình hiện tại
            var currentOrientation = (window.innerWidth > window.innerHeight) ? 'landscape' : 'portrait';
            // Lấy hướng ảnh gốc
            var imageOrientation = (imgElement.naturalWidth > imgElement.naturalHeight) ? 'landscape' : 'portrait';

            // Reset
            groupElement.className = 'slide-group active'; // Giữ lại 'active'
            imgElement.style.objectFit = '';

            if (currentOrientation === 'landscape') {
                // MÀN HÌNH NGANG
                if (imageOrientation === 'landscape') {
                    // 🛡️ Chế độ ngang, ảnh ngang -> hiển thị full, cắt bỏ nếu dư
                    imgElement.style.objectFit = 'cover';
                    groupElement.classList.add('show-blur'); // Vẫn hiện nền mờ để an toàn
                } else {
                    // Chế độ ngang, ảnh dọc -> giữ nguyên nội dung, nền mờ
                    imgElement.style.objectFit = 'contain';
                    groupElement.classList.add('show-blur');
                }
            } else {
                // MÀN HÌNH DỌC
                if (imageOrientation === 'portrait') {
                    // 🛡️ Chế độ dọc, ảnh dọc -> hiển thị full, cắt bỏ nếu dư
                    imgElement.style.objectFit = 'cover';
                    groupElement.classList.add('show-blur'); // Vẫn hiện nền mờ để an toàn
                } else {
                    // Chế độ dọc, ảnh ngang -> giữ nguyên nội dung, nền mờ
                    imgElement.style.objectFit = 'contain';
                    groupElement.classList.add('show-blur');
                }
            }
        }
        
        // 🆕 CẬP NHẬT HƯỚNG ẢNH KHI THAY ĐỔI HƯỚNG MÀN HÌNH (RESIZE)
        window.addEventListener('resize', function() {
            var activeFg = document.getElementById(isGroup1Active ? 'fg1' : 'fg2');
            var activeGroup = document.getElementById(isGroup1Active ? 'group1' : 'group2');
            if (activeFg) {
                updateImageDisplayMechanism(activeFg, activeGroup);
            }
        });

        function changeIntervalMode(modeVal) {
            currentActiveMode = modeVal; var seconds = stepSeconds[modeVal]; var btns = document.querySelectorAll('.speed-btn');
            for (var i = 0; i < btns.length; i++) { if ((i + 1) === modeVal) btns[i].classList.add('active'); else btns[i].classList.remove('active'); }
            if (slideInterval) clearInterval(slideInterval); slideInterval = setInterval(goToNextSlide, seconds * 1000);
        }
        function forceNextSlide(e) { if (e) e.stopPropagation(); goToNextSlide(); changeIntervalMode(currentActiveMode); }

        syncDriveData();
    </script>
</body>
</html>
