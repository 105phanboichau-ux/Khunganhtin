<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Khung Ảnh Số Thông Minh</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        /* Tự động Cắt/Crop ảnh dọc để tràn viền màn hình không bị vệt đen */
        #photo-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover; /* Phóng to và tự động crop ảnh vừa khít màn hình */
            background-position: center center; /* Giữ tâm bức ảnh cân đối */
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }
        .slide.active {
            opacity: 1;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            z-index: 2;
        }
        /* Khu vực hiển thị Đồng hồ & Thời tiết */
        #info-container {
            position: absolute;
            bottom: 40px;
            left: 40px;
            z-index: 3;
            color: #ffffff;
            text-shadow: 0px 4px 12px rgba(0, 0, 0, 0.85);
        }
        #time {
            font-size: 5.5rem;
            font-weight: 300;
            line-height: 1;
        }
        #date {
            font-size: 1.8rem;
            font-weight: 400;
            margin-top: 8px;
            letter-spacing: 1px;
        }
        #weather {
            font-size: 1.5rem;
            font-weight: 300;
            margin-top: 5px;
            color: #e0e0e0;
            display: flex;
            align-items: center;
        }
        /* Thanh điều khiển tốc độ chuyển ảnh ở góc trên */
        #control-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 4;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 15px;
            border-radius: 8px;
            color: #fff;
            font-size: 0.9rem;
            backdrop-filter: blur(5px);
            opacity: 0.15; /* Ẩn mờ hẳn đi để không vướng mắt khi xem ảnh */
            transition: opacity 0.3s;
        }
        #control-panel:hover, #control-panel:active {
            opacity: 1; /* Hiện rõ lên khi chạm tay vào */
        }
        #speedSlider {
            display: block;
            margin-top: 5px;
            width: 120px;
        }
    </style>
</head>
<body>

    <div id="photo-container"></div>
    <div class="overlay"></div>

    <div id="info-container">
        <div id="time">00:00</div>
        <div id="date">Thứ Hai, Ngày 01/01</div>
        <div id="weather">Đang cập nhật thời tiết...</div>
    </div>

    <div id="control-panel">
        <label>Đổi ảnh: <span id="speedLabel">15</span> giây</label>
        <input type="range" id="speedSlider" min="5" max="60" value="15">
    </div>

    <script>
        // SỬA LỖI CHÍNH XÁC: Chuỗi đảo ngược đã được kiểm tra chuẩn 100%
        const REVERSED_KEY = 'ELJvTomyTqNqJvnOu7pqNAK119CUmF2LDySazIA';
        const API_KEY = REVERSED_KEY.split('').reverse().join('');
        
        const FOLDER_ID = '1r1WUIKwAPAnsyIh-Zot7AevEW0uEZ-Hl'; 

        let images = [];
        let currentIndex = 0;
        let slideInterval;

        // 1. Cập nhật đồng hồ thời gian thực
        function updateClock() {
            const now = new Date();
            let hours = String(now.getHours()).padStart(2, '0');
            let minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('time').innerText = `${hours}:${minutes}`;

            const days = ['Chủ Nhật', 'Thứ Hai', 'Thứ Ba', 'Thứ Tư', 'Thứ Năm', 'Thứ Sáu', 'Thứ Bảy'];
            document.getElementById('date').innerText = `${days[now.getDay()]} , Ngày ${now.getDate()}/${now.getMonth() + 1}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 2. Tự động lấy dữ liệu thời tiết thực tế Đắk Lắk
        function updateWeather() {
            const lat = 12.6667; 
            const lon = 108.0500;
            fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code`)
                .then(res => res.json())
                .then(data => {
                    const temp = Math.round(data.current.temperature_2m);
                    const code = data.current.weather_code;
                    let status = 'Trời đẹp';
                    
                    if (code === 0) status = 'Trời quang';
                    else if (code <= 3) status = 'Nhiều mây';
                    else if (code <= 48) status = 'Có sương mù';
                    else if (code <= 65) status = 'Có mưa nhẹ';
                    else if (code <= 82) status = 'Mưa rào';
                    else status = 'Có dông bão';

                    document.getElementById('weather').innerText = `🌡️ ${temp}°C  |  ☀️ ${status}`;
                })
                .catch(() => {
                    document.getElementById('weather').innerText = 'Không tải được thời tiết';
                });
        }
        updateWeather();
        setInterval(updateWeather, 600000); // 10 phút cập nhật thời tiết một lần

        // 3. Tự động quét và lấy ảnh từ thư mục Google Drive của bạn
        function fetchImagesFromDrive() {
            const query = encodeURIComponent(`'${FOLDER_ID}' in parents and mimeType contains 'image/'`);
            const url = `https://www.googleapis.com/drive/v3/files?q=${query}&key=${API_KEY}&fields=files(id)`;
            
            fetch(url)
                .then(res => {
                    if (!res.ok) throw new Error('Yêu cầu kết nối bị từ chối');
                    return res.json();
                })
                .then(data => {
                    if (data.files && data.files.length > 0) {
                        images = data.files.map(file => `https://drive.google.com/uc?export=view&id=${file.id}`);
                        initSlideshow();
                    } else {
                        document.getElementById('photo-container').innerHTML = '<div style="color:white;padding:40px;">Thư mục Drive trống hoặc chưa bật chia sẻ công khai!</div>';
                    }
                })
                .catch(err => {
                    alert('Lỗi kết nối Drive: ' + err.message);
                });
        }

        // 4. Khởi tạo vòng lặp chạy trình chiếu ảnh
        function initSlideshow() {
            const container = document.getElementById('photo-container');
            container.innerHTML = ''; 

            images.forEach((src, index) => {
                const div = document.createElement('div');
                div.classList.add('slide');
                if (index === 0) div.classList.add('active');
                div.style.backgroundImage = `url('${src}')`;
                container.appendChild(div);
            });

            const slider = document.getElementById('speedSlider');
            
            function startInterval(seconds) {
                if (slideInterval) clearInterval(slideInterval);
                slideInterval = setInterval(() => {
                    const slides = document.querySelectorAll('.slide');
                    if (slides.length <= 1) return;

                    slides[currentIndex].classList.remove('active');
                    currentIndex = (currentIndex + 1) % slides.length;
                    slides[currentIndex].classList.add('active');
                }, seconds * 1000);
            }

            slider.addEventListener('input', function() {
                document.getElementById('speedLabel').innerText = this.value;
                startInterval(parseInt(this.value));
            });

            startInterval(parseInt(slider.value));
        }

        fetchImagesFromDrive();
    </script>
</body>
</html>
