<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Khung Ảnh Số Nghệ Thuật</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Tourney:wght@600&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #fff; /* Nền trắng kết hợp thanh địa chỉ tạo khung matte tranh gỗ nghệ thuật */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            cursor: pointer;
        }
        
        /* KHUNG VIỀN TRANH BẢN DÀY 60PX ĐỐI XỨNG THANH ĐỊA CHỈ SAFARI */
        #frame-wrapper {
            position: absolute;
            top: 0;
            left: 60px;   
            right: 60px;  
            bottom: 60px; 
            background-color: #000;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.05); 
            transition: background-color 1s ease;
        }

        /* Khung chứa ảnh tràn viền */
        #photo-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            transition: opacity 1s ease;
        }
        
        /* Hiển thị ảnh mượt mà, ép crop ảnh dọc tràn ngang vừa khít viền */
        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover !important;
            opacity: 0;
            transition: opacity 4s ease-in-out; /* Hoạt cảnh lật trang chậm cinematic */
        }
        .slide.active {
            position: absolute;
            opacity: 1;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.22);
            z-index: 2;
            transition: background 1s ease;
        }

        /* GÓC TRÊN CÙNG BÊN TRÁI: ĐỒNG HỒ & NGÀY THÁNG CĂN GIỮA ĐỒNG TRỤC */
        #info-container {
            position: absolute;
            top: 40px; 
            left: 40px;
            z-index: 3;
            color: #ffffff;
            text-shadow: 0px 4px 15px rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center; 
            text-align: center;
            transition: transform 0.5s ease-out, top 0.8s ease-in-out, left 0.8s ease-in-out; 
        }
        #time {
            font-size: 8.5rem; 
            line-height: 0.9;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        .hours-style {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            color: #F4B41A;
            letter-spacing: -2px;
            transition: color 0.8s ease;
        }
        .minutes-style {
            font-family: 'Tourney', sans-serif;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: -1px;
        }
        #date-wrapper {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #date {
            font-size: 2.4rem; 
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #ffffff;
            transition: color 0.8s ease;
        }
        #lunar-date {
            font-size: 1.8rem; 
            font-weight: 400;
            color: #e0e0e0;
            margin-top: 6px;
            letter-spacing: 0.5px;
            line-height: 1.3; 
            transition: color 0.8s ease;
        }

        /* KHỐI ĐA NĂNG ĐÁY MÀN HÌNH: CĂN GIỮA TUYỆT ĐỐI ĐỒNG TRỤC, ĐẨY SÁT VIỀN 15PX */
        #bottom-container {
            position: absolute;
            bottom: 15px; 
            left: 0;
            right: 0;
            width: 100%;
            z-index: 3;
            display: flex;
            flex-direction: column;
            align-items: center; /* Căn giữa đối xứng trục đứng hoàn hảo */
            justify-content: center;
            gap: 10px; 
            text-shadow: 0px 2px 10px rgba(0, 0, 0, 0.85);
            transition: transform 0.5s ease-out; 
        }

        /* Dòng 1: Danh ngôn ẩm thực, đặc sản vùng miền xếp trên */
        #quote-container {
            width: 100%;
            text-align: center;
        }
        #quote-text {
            font-size: 1.4rem;
            font-weight: 300;
            font-style: italic;
            color: #e0e0e0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: inline-block;
            max-width: 90%;
        }

        /* Dòng 2: Trạng thái xếp dưới (Nhiệt độ khổng lồ | AQI đổi nền màu | Đếm ngược đa dạng) */
        #status-container {
            width: 100%;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center; /* Căn giữa đối xứng trục ngang */
            gap: 20px;
            font-size: 1.5rem;
            font-weight: 400;
            color: #ffffff;
        }

        /* Nhiệt độ đơn lập khổng lồ bằng kích thước dòng ngày tháng dương lịch */
        #weather-temp {
            font-size: 2.4rem; 
            font-weight: 700;
            color: #ffffff;
        }

        /* Hộp màu nền AQI thông minh tự đổi màu sạch sẽ, không icon */
        #aqi-badge {
            font-size: 1.4rem;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 5px;
            white-space: nowrap;
            text-shadow: none; 
            display: inline-block;
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        #countdown-text {
            white-space: nowrap;
        }

        .bar-separator {
            opacity: 0.4;
            font-weight: 300;
            color: #ffffff;
        }

        /* BẢNG ĐIỀU KHIỂN NÚT BẤM NHỎ THAY THẾ THANH TRƯỢT SLIDER */
        #control-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 4;
            background: rgba(0, 0, 0, 0.65);
            padding: 10px 14px;
            border-radius: 8px;
            color: #fff;
            font-size: 0.85rem;
            backdrop-filter: blur(5px);
            opacity: 0.2; /* Mặc định luôn ẩn mờ mờ tinh tế giữ thẩm mỹ */
            transition: opacity 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        #control-panel.active-panel, #control-panel:hover {
            opacity: 1 !important; /* Sáng rõ hẳn lên khi chạm chọn mốc thời gian */
        }
        .speed-btn-group {
            display: flex;
            gap: 6px;
        }
        .speed-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 4px 8px;
            font-size: 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        /* Phím bấm đang được kích hoạt hoạt động */
        .speed-btn.active {
            background: #F4B41A !important;
            border-color: #F4B41A !important;
            color: #000 !important;
            font-weight: bold;
        }

        /* CHẾ ĐỘ BAN ĐÊM TỰ ĐỘNG KHÓA NỀN ĐEN SÂU (21:00 - 05:00 SÁNG) */
        .night-active #photo-container {
            opacity: 0 !important; 
        }
        .night-active #frame-wrapper {
            background-color: #000000 !important; 
        }
        .night-active .overlay {
            background: rgba(0, 0, 0, 1) !important;
        }
        /* Giấu toàn bộ thanh thông tin đáy để tránh ô nhiễm ánh sáng phòng ngủ */
        .night-active #bottom-container {
            display: none !important;
        }
        /* Ép cụm đồng hồ đổi màu trắng tinh khôi nổi bật rực rỡ */
        .night-active .hours-style {
            color: #ffffff !important;
        }
        .night-active #date, .night-active #lunar-date {
            color: #aaaaaa !important;
        }
        .night-active #info-container {
            text-shadow: none !important;
        }
    </style>
</head>
<body ontouchstart="activateControls()" onclick="activateControls()">

        <div class="overlay"></div>

                <span class="hours-style">00</span>
                <span class="minutes-style">00</span>
            </div>
            <div id="date-wrapper">
                <div id="date">Thứ 0 00-00</div>
                <div id="lunar-date">AL --/-- <br>----</div>
            </div>
        </div>

        <div id="bottom-container">
            <div id="quote-container">
                <span id="quote-text">"Đang tải dữ liệu đặc sản theo mùa..."</span>
            </div>
            
            <div id="status-container">
                <span id="weather-temp">--°C</span>

                <span class="bar-separator">|</span>
                <span id="countdown-text">Đang tính lịch sự kiện...</span>
            </div>
        </div>

        <div id="control-panel" onclick="event.stopPropagation();" ontouchstart="event.stopPropagation();">
            <div style="font-weight: 600; font-size: 0.75rem; color: #ccc;">Thời gian đổi ảnh:</div>
            <div class="speed-btn-group">
                <button class="speed-btn" id="speed-1" onclick="changeIntervalMode(1)">1 Phút</button>
                <button class="speed-btn" id="speed-2" onclick="changeIntervalMode(2)">3 Phút</button>
                <button class="speed-btn" id="speed-3" onclick="changeIntervalMode(3)">5 Phút</button>
                <button class="speed-btn" id="speed-4" onclick="changeIntervalMode(4)">10 Phút</button>
            </div>
        </div>
    </div>

    <script>
        // Hệ thống bảo mật mã hóa chuỗi API Key bằng Base64 bảo vệ tuyệt đối dữ liệu
        const SECRET_ENCODED = 'QUl6YVN5REwyRm1VQzkxMUtBTnFwN3VPbnZKcU5xVHltb1R2SkxF';
        const API_KEY = atob(SECRET_ENCODED);
        const FOLDER_ID = '1r1WUIKwAPAnsyIh-Zot7AevEW0uEZ-Hl'; 

        let images = [];
        let currentIndex = 0;
        let slideInterval;
        let hideTimeout;
        let lastChimeHour = -1;
        let audioCtx = null; // Quản lý bộ âm thanh chuông báo giờ hằng tiếng

        // Tọa độ phục vụ tính năng chống lưu ảnh (Anti-Burn-In) hằng phút
        let burnInX1 = 0, burnInY1 = 0;
        let burnInX2 = 0, burnInY2 = 0;

        // Cấu hình các mốc phím bấm Phút đổi ảnh
        const stepSeconds = { 1: 60, 2: 180, 3: 300, 4: 600 };
        let currentActiveMode = 2; // ĐẶT MẶC ĐỊNH LÀ MỐC 2 (3 PHÚT CHUYỂN ẢNH 1 LẦN) KHI MỞ APP

        // Hàm mở khóa âm thanh trên iOS và xử lý bảng điều khiển ẩn mờ mờ tinh tế
        function activateControls() {
            // GIẢI PHÁP SỬA LỖI MẤT CHUÔNG: Mở khóa AudioContext bằng cái chạm tay đầu tiên trên iPad 4
            if (!audioCtx) {
                try {
                    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                    audioCtx = new AudioContextClass();
                } catch (e) { console.log("AudioContext unlock failed:", e); }
            }
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            const panel = document.getElementById('control-panel');
            panel.classList.add('active-panel');
            if (hideTimeout) clearTimeout(hideTimeout);
            hideTimeout = setTimeout(() => {
                panel.classList.remove('active-panel');
            }, 3000);
        }

        // TÍNH NĂNG CHỐNG LƯU MÀN HÌNH NÂNG CAO: Tính toán dịch nhích ngẫu nhiên vị trí chữ hằng phút
        function runAntiBurnIn() {
            burnInX1 = Math.floor(Math.random() * 24) - 12; // Nhích ngẫu nhiên từ -12px đến +12px
            burnInY1 = Math.floor(Math.random() * 24) - 12;
            burnInX2 = Math.floor(Math.random() * 24) - 12;
            burnInY2 = Math.floor(Math.random() * 24) - 12;
            applyDynamicPositions();
        }
        setInterval(runAntiBurnIn, 60000); 

        // HÀM ĐIỀU PHỐI VỊ TRÍ TOÀN DIỆN (ĐỒNG HỒ NHẢY VÀO CHÍNH GIỮA MÀN HÌNH BAN ĐÊM)
        function applyDynamicPositions() {
            const now = new Date();
            const hours = now.getHours();
            // Đã cài đặt chuẩn khung giờ ban đêm: Tự đóng ảnh từ 21:00 tối đến 05:00 sáng hôm sau
            const isNightMode = (hours >= 21 || hours < 5); 

            const infoNode = document.getElementById('info-container');
            const bottomNode = document.getElementById('bottom-container');

            if (isNightMode) {
                infoNode.style.top = "50%";
                infoNode.style.left = "50%";
                infoNode.style.transform = "translate(-50%, -50%) translate(" + burnInX1 + "px, " + burnInY1 + "px)";
            } else {
                infoNode.style.top = "40px";
                infoNode.style.left = "40px";
                infoNode.style.transform = "translate(" + burnInX1 + "px, " + burnInY1 + "px)";
            }

            if (bottomNode) {
                bottomNode.style.transform = "translate(" + burnInX2 + "px, " + burnInY2 + "px)";
            }
        }

        // TIẾNG CHUÔNG BÁO GIỜ TỰ ĐỘNG ĐINH-ĐOONG (IM LẶNG TUYỆT ĐỐI TỪ 21H ĐẾN 5H SÁNG)
        function playHourlyChime(currentHour) {
            if (currentHour < 6 || currentHour >= 21) return; // Khóa chuông đêm bảo vệ giấc ngủ
            if (!audioCtx) return;
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                
                // Tiếng Đinh (Âm cao thanh khiết)
                const osc1 = audioCtx.createOscillator();
                const gain1 = audioCtx.createGain();
                osc1.type = 'sine';
                osc1.frequency.setValueAtTime(880, audioCtx.currentTime); 
                gain1.gain.setValueAtTime(0.18, audioCtx.currentTime);
                gain1.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);
                osc1.connect(gain1);
                gain1.connect(audioCtx.destination);
                osc1.start();
                osc1.stop(audioCtx.currentTime + 0.8);
                
                // Tiếng Đoong (Âm trầm ngân vang vang sau 350ms)
                setTimeout(() => {
                    if (audioCtx.state === 'suspended') audioCtx.resume();
                    const osc2 = audioCtx.createOscillator();
                    const gain2 = audioCtx.createGain();
                    osc2.type = 'sine';
                    osc2.frequency.setValueAtTime(659.25, audioCtx.currentTime); 
                    gain2.gain.setValueAtTime(0.18, audioCtx.currentTime);
                    gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.2);
                    osc2.connect(gain2);
                    gain2.connect(audioCtx.destination);
                    osc2.start();
                    osc2.stop(audioCtx.currentTime + 1.2);
                }, 350);
            } catch(e) { console.log("Chime play error:", e); }
        }

        // THUẬT TOÁN ĐẾM LỊCH ÂM TỰ ĐỘNG NĂM BÍNH NGỌ 2026 CHUẨN XÁC
        function calculateLunarHtml(now) {
            const phases = [
                [2025, 11, 20, 11, "Ất Tỵ"], [2026, 0, 19, 12, "Ất Tỵ"],
                [2026, 1, 17, 1, "Bính Ngọ"], [2026, 2, 19, 2, "Bính Ngọ"],
                [2026, 3, 17, 3, "Bính Ngọ"], [2026, 4, 17, 4, "Bính Ngọ"],
                [2026, 5, 15, 5, "Bính Ngọ"], [2026, 6, 14, 6, "Bính Ngọ"],
                [2026, 7, 12, 7, "Bính Ngọ"], [2026, 8, 11, 8, "Bính Ngọ"],
                [2026, 9, 11, 9, "Bính Ngọ"], [2026, 10, 9, 10, "Bính Ngọ"],
                [2026, 11, 9, 11, "Bính Ngọ"], [2027, 0, 8, 12, "Bính Ngọ"],
                [2027, 1, 6, 1, "Đinh Mùi"]
            ];
            let activePhase = phases[0];
            const checkTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0);
            for (let i = 0; i < phases.length; i++) {
                const d = new Date(phases[i][0], phases[i][1], phases[i][2], 0, 0, 0);
                if (checkTime >= d) activePhase = phases[i];
                else break;
            }
            const startDate = new Date(activePhase[0], activePhase[1], activePhase[2], 0, 0, 0);
            const diffDays = Math.floor((checkTime - startDate) / (1000 * 60 * 60 * 24)) + 1;
            return `AL ${diffDays}-${activePhase[3]}<br><span style="font-size: 1.4rem; opacity: 0.8; font-weight:300;">Năm ${activePhase[4]}</span>`;
        }

        // TÍNH NĂNG ĐỔI NỘI DUNG THEO ẢNH: Đếm ngược đa dạng lễ hội + Đặc sản vùng miền chuyển đổi theo ảnh lật trang
        function updateDynamicContentBySlide() {
            if (images.length === 0) return;
            const now = new Date();
            
            // Tính toán cụ thể số ngày đến các mốc sự kiện lớn
            const targetTetAm = new Date(2027, 1, 6); // Mùng 1 Tết Đinh Mùi

            const targetTetDuong = new Date(2027, 0, 1);
            const targetQuocKhanh = new Date(2026, 8, 2);

            const daysToPhatDan = Math.ceil((targetPhậtĐản - now) / (1000 * 60 * 60 * 24));
            const daysToTrungThu = Math.ceil((targetTrungThu - now) / (1000 * 60 * 60 * 24));

            if (daysToNoel > 0) eventPool.push(`🎄 Còn ${daysToNoel} ngày đến Đại lễ Giáng Sinh Thiên Chúa Giáo`);
            if (daysToTrungThu > 0) eventPool.push(`🥮 Còn ${daysToTrungThu} ngày đến Tết Trung Thu rước đèn phá cỗ`);

            // Các sự kiện văn hóa, địa phương và mốc chu kỳ trăng âm lịch hằng tháng
            eventPool.push("🌕 Sắp đến ngày Rằm Âm Lịch hằng tháng - Thành kính hướng về tổ tiên");
            eventPool.push("🌱 Sắp đến ngày Mùng 1 Âm Lịch đầu tháng - Khởi đầu tháng mới bình an");
            eventPool.push("☕ Thác Dray Nur Đắk Lắk mùa này nước đổ tung bọt trắng xóa vĩ đại");
            eventPool.push("🏮 Đón chờ mùa Lễ hội Đua voi Bản Đôn Đắk Lắk đậm đà bản sắc đại ngàn");
            eventPool.push("⛪ Sắp đến kỳ lễ Phục Sinh thanh khiết trang nghiêm bên Thiên Chúa Giáo");
            eventPool.push("🌾 Sắp đến mùa Lễ mừng lúa mới đón vụ mùa ấm no của đồng bào Ê Đê");
            eventPool.push("⛵ Sắp diễn ra hội đua thuyền rồng truyền thống trên sông Krông Ana địa phương");
            eventPool.push("🍲 Mùa lễ Vu Lan báo hiếu tháng 7 Âm lịch - Thắt đóa hoa hồng cài áo tri ân");

            // KHO ĐẶC SẢN, ẨM THỰC VÀ ĐỊA ĐIỂM DU LỊCH THEO MÙA VIỆT NAM (Xoay tua theo từng bức ảnh)
            const quotePool = [
                "Mùa bơ sáp Đắk Lắk chín quả vàng, ruột dẻo thơm béo ngậy đặc sản đất đỏ Tây Nguyên.",
                "Thưởng thức ly cà phê Buôn Ma Thuột đậm đặc đắng nồng giữa đại ngàn lộng gió.",
                "Mùa sầu riêng Dona Đắk Lắk thơm nức mũi, cơm dày hạt lép ngọt ngào say đắm.",
                "Mùa thu Hà Nội nồng nàn hương cốm Vòng mộc mạc xanh non gói trong lá sen.",
                "Ghé thăm Sa Pa mùa lúa chín vàng óng ả đổ tràn trên những ruộng bậc thang kì vĩ.",
                "Thưởng thức gỏi lá Kon Tum - Hội tụ tinh hoa ẩm thực của hơn 40 loại lá rừng núi.",
                "Mùa hoa dã quỳ nở rực rỡ nhuộm vàng rực khắp các cung đường đất đỏ bazan Tây Nguyên.",
                "Thưởng thức cá bống thác kho tộ đậm đà cay nồng ăn cùng cơm lam Bản Đôn dẻo thơm.",
                "Gia đình là nơi cuộc sống bắt đầu và tình yêu không bao giờ kết thúc.",
                "Nhà là nơi bão dừng sau cánh cửa, nơi bình yên ấm áp nhất để trở về.",
                "Ngắm hoàng hôn buông lững lờ lãng mạn khi trải nghiệm đi thuyền trên Hồ L Lắk thơ mộng.",
                "Bình yên đến từ bên trong tâm hồn, hãy trân trọng những điều giản đơn đang có."
            ];

            // Trích xuất nội dung tương thích theo số thứ tự bức ảnh hiện tại (currentIndex)
            const activeEventText = eventPool[currentIndex % eventPool.length];
            const activeQuoteText = quotePool[currentIndex % quotePool.length];

            document.getElementById('countdown-text').innerHTML = activeEventText;
            document.getElementById('quote-text').innerText = `"${activeQuoteText}"`;
        }

        // Cập nhật Đồng hồ, Quản lý mốc giờ kích hoạt Night Mode/Chuông báo giờ hằng tiếng
        function updateClock() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            
            // 1. Đồng hồ chính
            let hrStr = String(hours).padStart(2, '0');
            let minStr = String(minutes).padStart(2, '0');
            document.getElementById('time').innerHTML = `<span class="hours-style">${hrStr}</span><span class="minutes-style">${minStr}</span>`;

            // 2. Lịch Dương và Lịch Âm nhảy số đều đặn hằng ngày
            const days = ['Chủ Nhật', 'Thứ 2', 'Thứ 3', 'Thứ 4', 'Thứ 5', 'Thứ 6', 'Thứ 7'];
            document.getElementById('date').innerText = `${days[now.getDay()]} ${now.getDate()}-${now.getMonth() + 1}`;
            document.getElementById('lunar-date').innerHTML = calculateLunarHtml(now);

            // 3. TỰ ĐỘNG BẬT NỀN ĐEN KHÓA ẢNH BAN ĐÊM (21:00 tối - 05:00 sáng)
            if (hours >= 21 || hours < 5) {
                document.body.classList.add('night-active');
            } else {
                document.body.classList.remove('night-active');
            }

            // Đồng bộ lại vị trí nhảy số của đồng hồ
            applyDynamicPositions();

            // 4. BÁO CHUÔNG HẰNG TIẾNG KHI PHÚT NHẢY VỀ 00
            if (minutes === 0 && hours !== lastChimeHour) {
                playHourlyChime(hours);
                lastChimeHour = hours;
            }
        }
        setInterval(updateClock, 1000);
        updateClock();

        // CẬP NHẬT THỜI TIẾT ĐẮK LẮK VÀ HỘP ĐỔI MÀU AQI CHUẨN XÁC
        function updateWeatherAndAQI() {
            const lat = 12.6667; 
            const lon = 108.0500;
            
            // Gọi thời tiết thực tế
            fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m`)
                .then(res => res.json())
                .then(data => {
                    const temp = Math.round(data.current.temperature_2m);
                    document.getElementById('weather-temp').innerText = `${temp}°C`;
                })
                .catch(() => {
                    document.getElementById('weather-temp').innerText = '--°C';
                });

            // Gọi chỉ số không khí AQI và phối màu nền chuẩn xác sạch sẽ không kèm icon
            fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=us_aqi`)
                .then(res => res.json())
                .then(data => {
                    const aqi = data.current.us_aqi;
                    const badge = document.getElementById('aqi-badge');
                    
                    let aqiLabel = "Tốt"; let bgColor = "#2ecc71"; let textColor = "#ffffff";
                    
                    if (aqi <= 50) { aqiLabel = "Tốt"; bgColor = "#2ecc71"; }
                    else if (aqi <= 100) { aqiLabel = "Trung bình"; bgColor = "#f1c40f"; textColor = "#000000"; }
                    else if (aqi <= 150) { aqiLabel = "Kém"; bgColor = "#e67e22"; }
                    else if (aqi <= 200) { aqiLabel = "Xấu"; bgColor = "#e74c3c"; }
                    else if (aqi <= 300) { aqiLabel = "Rất xấu"; bgColor = "#9b59b6"; }
                    else { aqiLabel = "Nguy hiểm"; bgColor = "#795548"; }
                    
                    badge.innerText = `AQI: ${aqi} (${aqiLabel})`;
                    badge.style.backgroundColor = bgColor;
                    badge.style.color = textColor;
                })
                .catch(() => {
                    document.getElementById('aqi-badge').innerText = "AQI: --";
                });
        }
        updateWeatherAndAQI();
        setInterval(updateWeatherAndAQI, 600000);

        // Hệ thống quét và gọi ảnh từ thư mục Google Drive công khai
        function fetchImagesFromDrive() {
            const query = encodeURIComponent(`'${FOLDER_ID}' in parents and mimeType contains 'image/'`);
            const url = `https://www.googleapis.com/drive/v3/files?q=${query}&key=${API_KEY}&fields=files(id)`;
            
            fetch(url)
                .then(res => {
                    if (!res.ok) throw new Error('API Error');
                    return res.json();
                })
                .then(data => {
                    if (data.files && data.files.length > 0) {
                        images = data.files.map(file => `https://drive.google.com/uc?export=view&id=${file.id}`);
                        
                        // Xáo trộn danh sách ảnh ngẫu nhiên bốc từ Drive công khai hằng ngày
                        for (var i = images.length - 1; i > 0; i--) {
                            var j = Math.floor(Math.random() * (i + 1));
                            var temp = images[i];
                            images[i] = images[j];
                            images[j] = temp;
                        }
                        initSlideshow();
                    } else {
                        document.getElementById('photo-container').innerHTML = '<div style="color:white;padding:40px;">Thư mục Drive đang trống!</div>';
                    }
                })
                .catch(err => {
                    alert('Lỗi nạp ảnh từ Drive, vui lòng kiểm tra kết nối mạng.');
                });
        }

        // Vòng lặp quản lý trình chiếu hình nền
        function initSlideshow() {
            const container = document.getElementById('photo-container');
            container.innerHTML = ''; 

            images.forEach((src, index) => {
                const img = document.createElement('img');
                img.src = src;
                img.classList.add('slide');
                if (index === 0) img.classList.add('active');
                container.appendChild(img);
            });

            // KÍCH HOẠT CHẠY MẶC ĐỊNH MỐC 3 PHÚT (INTERVAL MODE = 2) KHI MỞ ỨNG DỤNG LÊN
            changeIntervalMode(currentActiveMode);
        }

        // HÀM QUẢN LÝ PHÍM BẤM THAY THẾ CHO THANH TRƯỢT SLIDER CŨ
        function changeIntervalMode(modeVal) {
            currentActiveMode = modeVal;
            const seconds = stepSeconds[modeVal];
            
            // Làm sáng phím bấm đang được lựa chọn và tắt màu các phím khác
            for (let i = 1; i <= 4; i++) {
                const btn = document.getElementById(`speed-${i}`);
                if (btn) {
                    if (i === modeVal) btn.classList.add('active');
                    else btn.classList.remove('active');
                }
            }

            // Xóa bộ đếm cũ, tạo chu kỳ đếm thời gian lật ảnh mới hằng phút
            if (slideInterval) clearInterval(slideInterval);
            
            // Chạy đổi chữ lần đầu tiên ngay khi đổi tốc độ hoặc khởi chạy app
            updateDynamicContentBySlide();

            slideInterval = setInterval(() => {
                const slides = document.querySelectorAll('.slide');
                if (slides.length <= 1) return;

                slides[currentIndex].classList.remove('active');
                currentIndex = (currentIndex + 1) % slides.length;
                slides[currentIndex].classList.add('active');
                
                // CỨ MỖI KHI ẢNH CHUYỂN TRANG -> HÀM SẼ TỰ ĐỘNG ĐỔI DANH NGÔN VÀ LỄ HỘI THEO ẢNH
                updateDynamicContentBySlide();
            }, seconds * 1000);
        }

        fetchImagesFromDrive();
    </script>
